name: Crawl MCP Registry

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source to crawl"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - official-registry
          - pulsemcp
          - smithery
          - npm
          - pypi
          - github
      batch_size:
        description: "Max servers per source (empty = no limit)"
        required: false
        type: string
        default: ""

  # Weekly crawl: Sundays 02:00 UTC — scan.yml auto-chains after completion
  schedule:
    - cron: "0 2 * * 0"

env:
  NODE_VERSION: "20"

jobs:
  # ── Always run migrations first ───────────────────────────────────────────
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@mcp-sentinel/database build
      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Shared setup steps as a reusable anchor ───────────────────────────────
  # (GH Actions doesn't support YAML anchors, so steps are repeated per job)

  # ── Smithery ──────────────────────────────────────────────────────────────
  crawl-smithery:
    name: "Crawl: Smithery"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate]
    if: |
      needs.migrate.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.source == 'all' ||
       github.event.inputs.source == 'smithery')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@mcp-sentinel/database build
      - name: Crawl Smithery
        run: pnpm --filter=@mcp-sentinel/crawler run crawl smithery ${{ inputs.batch_size && format('--limit={0}', inputs.batch_size) || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}

  # ── PulseMCP ──────────────────────────────────────────────────────────────
  crawl-pulsemcp:
    name: "Crawl: PulseMCP"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate]
    if: |
      needs.migrate.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.source == 'all' ||
       github.event.inputs.source == 'pulsemcp')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@mcp-sentinel/database build
      - name: Crawl PulseMCP
        run: pnpm --filter=@mcp-sentinel/crawler run crawl pulsemcp ${{ inputs.batch_size && format('--limit={0}', inputs.batch_size) || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── npm ───────────────────────────────────────────────────────────────────
  crawl-npm:
    name: "Crawl: npm"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate]
    if: |
      needs.migrate.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.source == 'all' ||
       github.event.inputs.source == 'npm')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@mcp-sentinel/database build
      - name: Crawl npm
        run: pnpm --filter=@mcp-sentinel/crawler run crawl npm ${{ inputs.batch_size && format('--limit={0}', inputs.batch_size) || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── PyPI ──────────────────────────────────────────────────────────────────
  crawl-pypi:
    name: "Crawl: PyPI"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate]
    if: |
      needs.migrate.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.source == 'all' ||
       github.event.inputs.source == 'pypi')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@mcp-sentinel/database build
      - name: Crawl PyPI
        run: pnpm --filter=@mcp-sentinel/crawler run crawl pypi ${{ inputs.batch_size && format('--limit={0}', inputs.batch_size) || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── GitHub ────────────────────────────────────────────────────────────────
  crawl-github:
    name: "Crawl: GitHub"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate]
    if: |
      needs.migrate.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.source == 'all' ||
       github.event.inputs.source == 'github')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@mcp-sentinel/database build
      - name: Crawl GitHub
        run: pnpm --filter=@mcp-sentinel/crawler run crawl github ${{ inputs.batch_size && format('--limit={0}', inputs.batch_size) || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Official MCP Registry ─────────────────────────────────────────────────
  crawl-official-registry:
    name: "Crawl: Official Registry"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate]
    if: |
      needs.migrate.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.source == 'all' ||
       github.event.inputs.source == 'official-registry')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@mcp-sentinel/database build
      - name: Crawl Official Registry
        run: pnpm --filter=@mcp-sentinel/crawler run crawl official-registry ${{ inputs.batch_size && format('--limit={0}', inputs.batch_size) || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Summary ───────────────────────────────────────────────────────────────
  crawl-summary:
    name: Crawl Summary
    runs-on: ubuntu-latest
    needs:
      - crawl-smithery
      - crawl-pulsemcp
      - crawl-npm
      - crawl-pypi
      - crawl-github
      - crawl-official-registry
    if: always()
    steps:
      - name: Report results
        run: |
          echo "## Crawl Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smithery         | ${{ needs.crawl-smithery.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PulseMCP         | ${{ needs.crawl-pulsemcp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm              | ${{ needs.crawl-npm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI             | ${{ needs.crawl-pypi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub           | ${{ needs.crawl-github.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Official Registry | ${{ needs.crawl-official-registry.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** If DATABASE_URL secret is not set, crawlers run in dry-run mode (data is fetched but not persisted)." >> $GITHUB_STEP_SUMMARY
