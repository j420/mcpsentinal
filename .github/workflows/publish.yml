name: Publish CLI to npm

# Triggered only by an explicit semver tag push (e.g. v0.2.0).
# Manual triggering is intentionally NOT supported — publishing must always
# be tied to a specific git tag so the published package is reproducible.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Minimal permissions — only what each job needs.
# id-token: write is required for npm provenance attestation (OIDC).
permissions:
  contents: read
  id-token: write

jobs:
  # ── Job 1: Validate everything before the publish job runs ─────────────────
  # This job MUST pass before publish is allowed. It runs full CI and a series
  # of security gates specific to npm publishing.
  validate:
    name: Pre-publish validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed for changelog generation and tag verification
          fetch-depth: 0

      - name: Verify tag is on main branch
        # Prevents publishing from feature branches by accident.
        # A tag that is not reachable from main is a sign of an irregular release.
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Tag $GITHUB_REF_NAME is not reachable from main branch."
            echo "::error::Only tags on the main branch lineage can be published."
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        # --frozen-lockfile prevents lockfile drift between CI and local dev.
        # If pnpm-lock.yaml is outdated, this fails loudly rather than silently
        # upgrading packages and publishing untested dependency versions.
        run: pnpm install --frozen-lockfile

      # ── Standard CI checks ────────────────────────────────────────────────
      - name: Type check
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # ── Security gates (npm-publish specific) ─────────────────────────────

      - name: Verify package has an explicit 'files' allowlist
        # Without a 'files' field, npm publish includes everything not in
        # .npmignore — this can accidentally include .env files, source maps
        # with sensitive comments, or internal config.
        working-directory: packages/cli
        run: |
          FILES_FIELD=$(node -e "const p = require('./package.json'); console.log(JSON.stringify(p.files ?? null))")
          if [ "$FILES_FIELD" = "null" ] || [ "$FILES_FIELD" = "[]" ]; then
            echo "::error::packages/cli/package.json is missing a 'files' allowlist."
            echo "::error::Add a 'files' field listing only the directories to publish (e.g. [\"dist\"])."
            exit 1
          fi
          echo "files allowlist: $FILES_FIELD"

      - name: Verify no install-time hooks
        # postinstall/preinstall scripts run when a user installs the package.
        # MCP Sentinel detects this pattern in rule K9 — we must not trigger it
        # in our own package. No code should run on install.
        working-directory: packages/cli
        run: |
          BANNED_HOOKS=("preinstall" "install" "postinstall")
          FOUND=()
          for HOOK in "${BANNED_HOOKS[@]}"; do
            HAS=$(node -e "const p = require('./package.json'); console.log(p.scripts?.['$HOOK'] ? 'yes' : 'no')")
            if [ "$HAS" = "yes" ]; then
              FOUND+=("$HOOK")
            fi
          done
          if [ "${#FOUND[@]}" -gt 0 ]; then
            echo "::error::Forbidden install-time hooks found in package.json: ${FOUND[*]}"
            echo "::error::Install hooks run arbitrary code on the user's machine — remove them."
            exit 1
          fi
          echo "No install-time hooks found."

      - name: Audit production dependencies for known CVEs
        # Only audit prod dependencies (--prod) — dev deps don't ship in the
        # published package. Fail on high severity or above.
        working-directory: packages/cli
        run: pnpm audit --prod --audit-level=high

      - name: Dry-run pack and check for sensitive files
        # npm pack --dry-run lists all files that would be published.
        # We fail if any file looks like a secret, key, or credential.
        working-directory: packages/cli
        run: |
          PACK_LIST=$(npm pack --dry-run 2>&1)
          echo "$PACK_LIST"

          # Patterns that should never appear in a published package
          SUSPICIOUS=$(echo "$PACK_LIST" | grep -iE '\.(env|key|pem|p12|pfx|p8|secret|credential|token|auth)$' || true)
          if [ -n "$SUSPICIOUS" ]; then
            echo "::error::Potentially sensitive files detected in package contents:"
            echo "$SUSPICIOUS"
            exit 1
          fi

          # Also catch .env.* variants (e.g. .env.local, .env.production)
          ENV_FILES=$(echo "$PACK_LIST" | grep -E '\.env(\.[a-zA-Z]+)?$' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::Environment files detected in package contents:"
            echo "$ENV_FILES"
            exit 1
          fi

          echo "No sensitive files detected in package contents."

      - name: Verify package version matches git tag
        # Prevents publishing a package whose package.json version doesn't match
        # the git tag (e.g. tagging v1.0.0 but package.json still says 0.9.0).
        working-directory: packages/cli
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"  # strip leading 'v' from tag
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            echo "::error::Update packages/cli/package.json version before tagging."
            exit 1
          fi
          echo "Version match confirmed: $PKG_VERSION"

  # ── Job 2: Publish to npm ───────────────────────────────────────────────────
  # Runs only after validate passes. Protected by a GitHub Environment
  # ("npm-publish") that requires manual reviewer approval before proceeding.
  # This prevents automated publish from a stolen tag.
  publish:
    name: Publish to npm
    needs: validate
    runs-on: ubuntu-latest

    # The "npm-publish" environment should be configured in GitHub with:
    #   - Required reviewers: at least one maintainer
    #   - Deployment branch rule: only tags matching v*.*.*
    # This gives a human checkpoint before any code reaches the npm registry.
    environment: npm-publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js with npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish with provenance attestation
        # --provenance generates a signed SLSA provenance attestation linking
        # the published package back to this specific GitHub Actions run.
        # This allows npm users to verify the package was built from this exact
        # commit and not tampered with post-build.
        # Requires id-token: write permission (set at workflow level above).
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        # Create a GitHub Release from the tag so the changelog is visible
        # in the repository UI without navigating to npm.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "mcp-sentinel $GITHUB_REF_NAME" \
            --notes "Published to npm: https://www.npmjs.com/package/mcp-sentinel/v/${GITHUB_REF_NAME#v}" \
            --verify-tag
