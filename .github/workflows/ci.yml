name: CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - 'packages/**/*.json'
      - 'packages/**/*.mjs'
      - 'packages/**/Dockerfile'
      - 'rules/**/*.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
      - 'tools/scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - 'packages/**/*.json'
      - 'packages/**/*.mjs'
      - 'packages/**/Dockerfile'
      - 'rules/**/*.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
      - 'tools/scripts/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_dev
          POSTGRES_DB: mcp_sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://sentinel:sentinel_dev@localhost:5432/mcp_sentinel_test

      - name: Build
        run: pnpm build
