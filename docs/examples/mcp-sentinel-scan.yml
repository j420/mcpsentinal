# Example: Add to .github/workflows/mcp-sentinel.yml in your project
name: MCP Security Scan

on:
  pull_request:
    paths:
      - '**/mcp.json'
      - '**/.mcp.json'
      - '**/claude_desktop_config.json'
      - '.cursor/mcp.json'
      - '.vscode/mcp.json'
      - '.windsurf/mcp.json'
      - '.kiro/mcp.json'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mcp-sentinel/mcp-sentinel@v1
        with:
          min-score: 60
          fail-on: critical
