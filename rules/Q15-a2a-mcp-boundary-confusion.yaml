id: Q15
name: A2A/MCP Protocol Boundary Confusion
category: cross-ecosystem-emergent
severity: high
owasp: MCP06-excessive-permissions
mitre: AML.T0054

# THREAT INTELLIGENCE (Senior Security Architect — Cross-Ecosystem):
#
# Google's Agent-to-Agent (A2A) protocol and Anthropic's MCP are both under
# the Linux Foundation's AAIF (Dec 2025). Servers increasingly support BOTH
# protocols, creating a protocol boundary confusion attack surface:
#
# ATTACK MODEL:
#   1. A2A agent sends task to an MCP server via A2A protocol
#   2. MCP server treats A2A task metadata as tool input
#   3. A2A "skill" descriptions processed as MCP tool descriptions
#   4. Trust levels from A2A context don't translate to MCP permissions
#
# SPECIFIC RISKS:
# - A2A Agent Cards contain skill descriptions → processed as prompt context
# - A2A "parts" (TextPart, FilePart, DataPart) have no MCP-equivalent
#   content policy → injection via unsanitized parts
# - A2A push notifications re-enter MCP context without re-validation
# - Fake agent advertisement: A2A allows agent discovery → malicious agents
#   register and are discovered by MCP-connected clients
#
# Intelligence: A2A specification (Google, 2025), AAIF formation (Dec 2025),
# arXiv 2602.19555 "fake agent advertisement and unauthorized registration"

detect:
  type: typed
    # Dual A2A+MCP server patterns
    - "(?i)(?:a2a|agent[_\\s-]?to[_\\s-]?agent).*(?:mcp|model[_\\s-]?context)"
    - "(?i)(?:mcp|model[_\\s-]?context).*(?:a2a|agent[_\\s-]?to[_\\s-]?agent)"
    - "(?i)(?:AgentCard|agent[_\\s-]?card|skill[_\\s-]?(?:description|definition)).*(?:mcp|tool)"
    # A2A task/message flowing into MCP tool context
    - "(?i)(?:Task|TaskResult|Message|Part).*(?:tool[_\\s-]?(?:input|call|invoke|execute))"
    - "(?i)(?:TextPart|FilePart|DataPart).*(?:mcp|tool[_\\s-]?(?:param|arg|input))"
    # A2A push notifications entering MCP context
    - "(?i)(?:push[_\\s-]?notif|webhook|callback).*(?:a2a|agent).*(?:mcp|tool)"
    # Agent discovery/registration without verification
    - "(?i)(?:discover|register|advertise).*(?:agent|skill|capability)(?!.*(?:verify|auth|sign|trust))"
    - "(?i)(?:agent[_\\s-]?(?:registry|directory|discovery)).*(?:open|public|unauthenticated)"
remediation: "Servers bridging A2A and MCP protocols must: (1) sanitize all A2A task metadata before passing to MCP tool inputs, (2) apply MCP content policies to A2A TextPart/FilePart/DataPart content, (3) validate A2A push notifications before they re-enter MCP context, (4) require cryptographic verification for agent discovery and registration (prevent fake agent advertisement — arXiv 2602.19555), (5) maintain separate permission models for A2A and MCP operations — trust in one protocol must not automatically grant trust in the other."
test_cases:
  true_positive:
    - { description: "Source code passes A2A TaskResult directly into MCP tool input without sanitization", expected: true }
    - { description: "Server registers A2A agent skills as MCP tools without applying content policy", expected: true }
  true_negative:
    - { description: "Pure MCP server with no A2A protocol support", expected: false }
    - { description: "A2A/MCP bridge with explicit sanitization and separate permission models", expected: false }
enabled: true
