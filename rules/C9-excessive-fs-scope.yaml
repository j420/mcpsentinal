id: C9
name: Excessive Filesystem Scope
category: code-analysis
severity: high
owasp: MCP03-command-injection
mitre: null
detect:
  type: regex
  patterns:
    - "(?i)(?:readdir|readFile|writeFile|appendFile|unlink|rmdir).*['\"]\\s*/\\s*['\"]"
    - "(?i)(?:open|glob)\\s*\\(\\s*['\"]\\s*/\\s*['\"]"
    - "(?i)os\\.walk\\s*\\(\\s*['\"]\\s*/\\s*['\"]"
    - "(?i)allowed.*[=:].*['\"]\\s*/\\s*['\"]"
  context: source_code
  exclude_patterns:
    - "/tmp"
    - "/var/log"
    - "sandbox"
remediation: "Restrict filesystem access to specific directories. Use a base directory and validate all paths resolve within it. Never allow root-level filesystem access."
test_cases:
  true_positive:
    - { description: "Source code contains readdir('/') listing the root filesystem directory", expected: true }
    - { description: "Source code contains os.walk('/') walking the entire filesystem from root", expected: true }
  true_negative:
    - { description: "Source code contains readdir('/tmp/myapp') restricted to a temp subdirectory", expected: false }
    - { description: "Source code operates within a sandboxed directory with no root access", expected: false }
enabled: true
