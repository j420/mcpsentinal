id: K14
name: Agent Credential Propagation via Shared State
category: compliance-governance
severity: critical
owasp: MCP05-privilege-escalation
mitre: AML.T0054

# FRAMEWORK MAPPING (P11 Compliance Mapper):
# - OWASP ASI03: Identity & Privilege Abuse — delegated permissions
# - OWASP ASI07: Insecure Inter-Agent Communication
# - MAESTRO L7: Agent Ecosystem — cross-agent credential exposure
# - CoSAI MCP-T1: Token theft via agent-to-agent propagation
# - MITRE ATLAS: AI Agent Tool Invocation (AML.T0086) — credential exfil via tool params
#
# THE ATTACK: In multi-agent architectures (LangGraph, AutoGen, CrewAI),
# Agent A obtains credentials and writes them to shared memory (vector store,
# scratchpad, environment variables). Agent B reads the shared state and
# now possesses credentials it was never authorized to hold.
# Documented: Invariant Labs (Jan 2026) "Cross-agent pollution via shared MCP memory"

detect:
  type: typed
remediation: "Never write credentials to shared agent state. Use credential vaults (HashiCorp Vault, AWS Secrets Manager) with per-agent scoped access. Implement OAuth token exchange (RFC 8693) for cross-agent authorization. Redact credentials from all agent outputs before writing to shared memory. Required by OWASP ASI03/ASI07 and MAESTRO L7."
test_cases:
  true_positive:
    - { description: "Source code writes user's API key to shared_memory store accessible by downstream agents", expected: true }
    - { description: "Source code sets process.env.API_TOKEN from tool output for other agent processes", expected: true }
    - { description: "Agent output state contains extracted bearer token passed to next agent in chain", expected: true }
  true_negative:
    - { description: "Source code redacts credentials before writing results to shared agent state", expected: false }
    - { description: "Test fixture sets up mock shared state with fake credentials", expected: false }
enabled: true
