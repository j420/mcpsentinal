# MCP Sentinel — Attack Vector Taxonomy
#
# Top-level categories are the 13 risk domains from `rules/framework-registry.yaml`.
# Sub-categories are ATTACK MECHANISMS (HOW the attack works), not technical surfaces.
# Every active rule has exactly one canonical placement; rules that legitimately span
# mechanisms list their secondary placements under `cross_references` of the primary
# sub-category. The reverse-pointer (where a rule appears as a secondary "see also")
# is rendered by consumers from a single source of truth — we never duplicate a rule
# as a primary entry in two places.
#
# Sub-category and category ids are kebab-case, unique, and stable. Renaming an id
# is a breaking change for the API; renaming `title` is not.
#
# Schema contract (v1) is verified by `packages/analyzer/__tests__/taxonomy-traceability.test.ts`.
# Do NOT edit this file by hand if you cannot regenerate the traceability invariants.

version: 1
generated_at: "2026-05-01T00:00:00.000Z"

categories:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. PROMPT INJECTION
  # ═══════════════════════════════════════════════════════════════════════════
  - id: prompt-injection
    title: "Prompt Injection"
    summary: |
      Untrusted content hijacks AI behavior by reaching the model through a
      spec-sanctioned trust surface — descriptions, schemas, the initialize
      handshake, resources, prompts, or sampling callbacks.
    frameworks: [MCP01, ASI01, ASI06, CoSAI-T4, MAESTRO-L3, EU-AI-Act-Art-15, AML.T0054, AML.T0058]
    sub_categories:

      - id: direct-input-injection
        title: "Direct Input Injection"
        summary: >
          Injection payload sits in a field the AI is designed to read literally —
          a tool description, parameter description, or full JSON Schema field.
          No intermediate hop is needed.
        rule_ids: [A1, B5, J3]
        cross_references: [A5, A9, J6]

      - id: indirect-gateway-injection
        title: "Indirect Gateway Injection"
        summary: >
          The MCP server itself is benign, but acts as a conduit: it ingests
          attacker-controlled external content (web pages, emails, issues,
          stored data) and returns it where the AI treats it as instructions.
        rule_ids: [G1, J5]
        cross_references: [F6, N12, J6]

      - id: context-and-trust-manipulation
        title: "Context & Trust Manipulation"
        summary: >
          Attacks that exploit how the model REASONS about a tool or session:
          authority claims, trust references to prior approvals, context-window
          saturation, and initialize-handshake injection that frames the entire
          conversation.
        rule_ids: [G2, G4, G5, H2]
        cross_references: [J6, N9]

      - id: encoding-and-obfuscation
        title: "Encoding & Obfuscation"
        summary: >
          The payload is hidden from human review but still parses to the model:
          zero-width characters, base64/URL/HTML-entity encoded directives, or
          anomalously long descriptions that bury an injection in noise.
        rule_ids: [A7, A9, A5]
        cross_references: [A6, M1]

      - id: protocol-surface-injection
        title: "Protocol-Surface Injection"
        summary: >
          The injection rides a protocol primitive other than tool descriptions —
          resource metadata, prompt templates, sampling callbacks, JSON-RPC
          error objects, the MCP logging channel, or resource subscriptions
          mutating after consent.
        rule_ids: [I3, I6, I7, N4, N9, N12]
        cross_references: [G3, G1]

      - id: tool-preference-and-output-poisoning
        title: "Tool Preference & Output Poisoning"
        summary: >
          The attacker engineers descriptions or runtime tool responses to bias
          the model's tool-selection or to embed manipulation instructions
          inside an error message the model has to read to recover.
        rule_ids: [J6, G3]
        cross_references: [J5, A2]

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. TOOL POISONING
  # ═══════════════════════════════════════════════════════════════════════════
  - id: tool-poisoning
    title: "Tool Poisoning"
    summary: |
      Tools that lie about what they do — deceptive metadata, name shadowing,
      annotation deception, namespace squatting, or behavior that drifts after
      the user has trusted them.
    frameworks: [MCP02, ASI02, CoSAI-T4, CoSAI-T6, CoSAI-T9, MAESTRO-L3, MAESTRO-L7, EU-AI-Act-Art-13, AML.T0058]
    sub_categories:

      - id: deceptive-naming
        title: "Deceptive Naming"
        summary: >
          The tool's name itself is the lie: it shadows a known official tool
          (across servers OR across resources/tools in the same server), uses
          Unicode homoglyphs, or squats on a first-party namespace
          (anthropic-mcp-*, openai-mcp-*).
        rule_ids: [A4, A6, F5, I5]
        cross_references: []

      - id: deceptive-description
        title: "Deceptive Description"
        summary: >
          The description claims a benign capability (read-only, narrow scope)
          while the schema and source code contradict it. Detected as a
          mismatch between two declared facts about the same tool.
        rule_ids: [A2, A8]
        cross_references: [B7, F2]

      - id: annotation-deception
        title: "Annotation Deception"
        summary: >
          MCP tool annotations (readOnlyHint / destructiveHint / idempotentHint)
          are wrong or missing. AI clients trust annotations for auto-approval —
          deceptive or absent annotations bypass user consent entirely.
        rule_ids: [I1, I2]
        cross_references: [K12, K13]

      - id: behavior-drift
        title: "Behavior Drift"
        summary: >
          The tool was honest at scan-time-T0 but is no longer honest at T1.
          Tool count surges, dangerous tools added after baseline, descriptions
          rewritten on a security-critical tool. Pure rug-pull patterns.
        rule_ids: [G6]
        cross_references: [L15]

      - id: capability-overreach
        title: "Capability Overreach"
        summary: >
          The tool's runtime behavior or static profile is more dangerous than
          its description suggests — high-risk capability combinations,
          consent-fatigue exploitation, or response payloads carrying
          executable content / unsanitized output.
        rule_ids: [F2, I16, K12, K13]
        cross_references: [F1, F3]

      - id: update-channel-spoofing
        title: "Update-Channel Spoofing"
        summary: >
          Forged "this tool was updated" notification or registry-metadata
          spoofing tricks the AI / user into trusting a substitute that bypasses
          integrity checks.
        rule_ids: [L15]
        cross_references: [G6, K10, L10]

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. CODE VULNERABILITIES
  # ═══════════════════════════════════════════════════════════════════════════
  - id: code-vulnerabilities
    title: "Code Vulnerabilities"
    summary: |
      Exploitable flaws in MCP server source code — classical injection,
      deserialization, dynamic-code-evaluation, and configuration sinks that
      arbitrary tool input reaches without sanitization.
    frameworks: [MCP03, MCP05, MCP07, ASI02, ASI05, CoSAI-T3, MAESTRO-L3, EU-AI-Act-Art-15, AML.T0054]
    sub_categories:

      - id: command-and-shell-execution
        title: "Command & Shell Execution"
        summary: >
          Tainted argument flows into a shell, subprocess, or git invocation —
          the canonical RCE family. Includes argument-injection vectors that
          look structured (git --upload-pack=...) but reach the same outcome.
        rule_ids: [C1, J2]
        cross_references: [C9, C16]

      - id: dynamic-code-and-deserialization
        title: "Dynamic Code Evaluation & Deserialization"
        summary: >
          Tainted data is interpreted as program text or as a serialized object
          graph: eval, new Function, pickle.loads, yaml.load, node-serialize,
          JSON-driven SSTI rendered against a user template.
        rule_ids: [C12, C13, C16]
        cross_references: [C1]

      - id: data-store-injection
        title: "Data Store Injection"
        summary: >
          Concatenation-based injection into a data store: SQL, prototype
          pollution against an in-memory object store, server-side template
          injection that compromises the rendering context.
        rule_ids: [C4, C10]
        cross_references: [C13]

      - id: filesystem-and-network-traversal
        title: "Filesystem & Network Traversal"
        summary: >
          Tainted paths or URLs reach filesystem APIs or outbound HTTP without
          allow-listing — directory traversal, SSRF, or scopes broader than
          the user-visible declaration.
        rule_ids: [C2, C3, C9]
        cross_references: [I4]

      - id: insecure-credential-and-crypto
        title: "Insecure Credential & Crypto"
        summary: >
          Hardcoded secrets, JWT algorithm confusion, and timing-attack-prone
          equality on secrets — crypto and credential handling that fails
          before any business-logic vulnerability is reached.
        rule_ids: [C5, C14, C15]
        cross_references: [D6]

      - id: server-hardening-failures
        title: "Server-Hardening Failures"
        summary: >
          Defenses that should be on by default and aren't: error leakage in
          responses, wildcard CORS, network bind without auth, and ReDoS-prone
          regex on user input.
        rule_ids: [C6, C7, C8, C11]
        cross_references: [E1]

      - id: openapi-and-spec-injection
        title: "OpenAPI / Spec Field Injection"
        summary: >
          Generator-based supply chain attack: an OpenAPI spec field flows
          unsanitized into generated MCP server code, compromising every
          server downstream of the spec.
        rule_ids: [J7]
        cross_references: [L2, L12]

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. DATA EXFILTRATION
  # ═══════════════════════════════════════════════════════════════════════════
  - id: data-exfiltration
    title: "Data Exfiltration"
    summary: |
      Sensitive data leaves the trust boundary — through HTTP, DNS, headers,
      timing, or composed-tool flows that no individual tool would have been
      flagged on.
    frameworks: [MCP04, ASI06, ASI07, CoSAI-T5, MAESTRO-L2, MAESTRO-L7, EU-AI-Act-Art-15, AML.T0057]
    sub_categories:

      - id: explicit-network-exfiltration
        title: "Explicit Network Exfiltration"
        summary: >
          A direct path: a known-suspicious URL in a description, a call to a
          known-tunneling service (ngrok / serveo / requestbin), or DNS-based
          exfiltration through a recursive resolver.
        rule_ids: [A3, G7]
        cross_references: [C3]

      - id: source-to-sink-flow
        title: "Source-to-Sink Flow"
        summary: >
          The exfil pattern is structural: the same server reads sensitive
          data and writes to an external sink, even when no individual tool
          looks dangerous on its own.
        rule_ids: [F3, F7]
        cross_references: [F1, K18]

      - id: cross-config-trifecta
        title: "Cross-Config Lethal Trifecta"
        summary: >
          Private data + untrusted content + external comms distributed
          across MULTIPLE servers in the same client config. F1 misses this
          because no single server has all three; I13 catches it.
        rule_ids: [I13]
        cross_references: [F1, H3]

      - id: covert-channels
        title: "Covert Channels"
        summary: >
          Exfil through channels that don't look like exfil — timing, error
          message fingerprints, ambient credentials, telemetry pipes the user
          didn't see, environment-variable harvesting.
        rule_ids: [O5, O6, O8, O9, O10]
        cross_references: [G7]

      - id: protocol-mediated-exfiltration
        title: "Protocol-Mediated Exfiltration"
        summary: >
          Exfil rides a spec-sanctioned MCP primitive: dangerous resource
          URIs, elicitation flows that harvest credentials, or AI-mediated
          exfiltration through the tool-argument channel.
        rule_ids: [I4, I9]
        cross_references: [I10, K18]

      - id: trust-boundary-violation
        title: "Trust-Boundary Data Flow"
        summary: >
          Sensitive data crosses an internal trust boundary inside a tool
          response (high-sensitivity source → low-sensitivity sink) and is
          surfaced to clients that should never have seen it. Includes
          UI-clipboard exfiltration injection.
        rule_ids: [K18, O4]
        cross_references: [F3, K8]

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. AUTHENTICATION & IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════
  - id: authentication
    title: "Authentication & Identity"
    summary: |
      Authentication and identity flaws specific to the MCP ecosystem — OAuth
      misuse, token lifecycle, session boundaries, and agent-identity
      impersonation.
    frameworks: [MCP07, ASI03, CoSAI-T1, MAESTRO-L6, EU-AI-Act-Art-15, AML.T0055]
    sub_categories:

      - id: missing-auth
        title: "Missing Authentication"
        summary: >
          The MCP server exposes capability without authenticating the caller —
          either no auth at all, or no auth on the network listener.
        rule_ids: [E1]
        cross_references: [C8]

      - id: oauth-misimplementation
        title: "OAuth Misimplementation"
        summary: >
          The OAuth 2.0 / RFC 9700 surface is implemented with banned or
          unsafe patterns — implicit flow, ROPC, redirect_uri injection,
          missing state validation, or client-side token storage.
        rule_ids: [H1]
        cross_references: [K6, K7]

      - id: token-lifecycle-and-scope
        title: "Token Lifecycle & Scope"
        summary: >
          OAuth tokens are issued with overly broad scopes or never rotated.
          A breached token compromises an unbounded set of resources.
        rule_ids: [K6, K7]
        cross_references: [H1]

      - id: cross-boundary-credential-sharing
        title: "Cross-Boundary Credential Sharing"
        summary: >
          A credential issued to one principal is reused or shared across an
          agent / service / process boundary that should have isolated it.
        rule_ids: [K8]
        cross_references: [K14]

      - id: session-and-transport-security
        title: "Session & Transport Security"
        summary: >
          Streamable-HTTP session weaknesses (predictable session ids, no
          expiration, no CSRF), trust-on-first-use bypass on connect.
        rule_ids: [I15, N14]
        cross_references: [E2]

      - id: agent-identity-impersonation
        title: "Agent Identity Impersonation"
        summary: >
          One agent presents as another in a multi-agent / multi-protocol
          context, defeating downstream authorization decisions.
        rule_ids: [Q6]
        cross_references: [K14, K15]

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. SUPPLY CHAIN SECURITY
  # ═══════════════════════════════════════════════════════════════════════════
  - id: supply-chain-security
    title: "Supply Chain Security"
    summary: |
      Compromise of the build, publish, or distribution pipeline — dependencies,
      manifests, registries, base images, and CI/CD configuration that ship
      malicious code BEFORE the MCP server even runs.
    frameworks: [MCP08, MCP10, ASI04, CoSAI-T6, CoSAI-T8, CoSAI-T11, MAESTRO-L4, EU-AI-Act-Art-9, AML.T0017]
    sub_categories:

      - id: known-vulnerable-dependencies
        title: "Known Vulnerable Dependencies"
        summary: >
          Direct dependencies carry known CVEs, are abandoned (no upstream
          maintenance), are present in unmaintainably-large numbers, or
          contain weak cryptography — the OSV-style audit surface.
        rule_ids: [D1, D2, D4, D6]
        cross_references: [C14, K11]

      - id: malicious-and-typosquat-packages
        title: "Malicious & Typosquat Packages"
        summary: >
          The dependency itself is the attack: a confirmed-malicious package,
          a typosquat of a popular MCP SDK name, or a dependency-confusion
          high-version attack against scoped names.
        rule_ids: [D3, D5, D7]
        cross_references: [F5, K10]

      - id: install-time-execution
        title: "Install-Time Execution"
        summary: >
          Code runs at install time, not at use time — npm/yarn post-install
          hooks, build scripts that fetch unsigned blobs.
        rule_ids: [K9]
        cross_references: [L2]

      - id: registry-and-distribution-substitution
        title: "Registry & Distribution Substitution"
        summary: >
          The package the user installs is not the package the maintainer
          published — registry substitution, version-rollback / downgrade,
          metadata spoofing, missing integrity verification, base-image
          and symlink supply-chain risks at the container layer.
        rule_ids: [K10, K11, L3, L6, L8, L10]
        cross_references: [L15, P5]

      - id: ci-cd-poisoning
        title: "CI/CD Poisoning"
        summary: >
          Build pipeline compromise: GitHub-Actions tag poisoning, malicious
          build plugins, build-credential file theft, build-artifact tampering,
          CI secret exfiltration patterns.
        rule_ids: [L1, L2, L9, L12, L13]
        cross_references: [K9]

      - id: manifest-and-entry-point-confusion
        title: "Manifest & Entry-Point Confusion"
        summary: >
          The shipped artifact's entry point is not what the manifest claims —
          package-manifest confusion, transitive-server delegation, hidden
          bin/exports mismatch in package.json.
        rule_ids: [L5, L7, L14]
        cross_references: [L4]

      - id: config-injection-and-bridge-supply-chain
        title: "Config Injection & Bridge Supply Chain"
        summary: >
          Environment variables, IDE/MCP config files, or MCP-bridge packages
          inject runtime behavior the static manifest never declared.
        rule_ids: [L4, L11, Q4, Q13]
        cross_references: [J1]

  # ═══════════════════════════════════════════════════════════════════════════
  # 7. HUMAN OVERSIGHT
  # ═══════════════════════════════════════════════════════════════════════════
  - id: human-oversight
    title: "Human Oversight"
    summary: |
      Confirmation bypass, consent fatigue, and trust-delegation patterns that
      defeat the human-in-the-loop control required by EU AI Act Art. 14.
    frameworks: [MCP06, ASI09, CoSAI-T2, CoSAI-T9, MAESTRO-L6, EU-AI-Act-Art-14]
    sub_categories:

      - id: missing-confirmation
        title: "Missing Confirmation"
        summary: >
          Destructive operations execute without an explicit human gate. The
          rule does not require the gate to be present at runtime — only that
          the code path could exist that bypasses it.
        rule_ids: [K4]
        cross_references: [K12]

      - id: auto-approve-and-bypass
        title: "Auto-Approve & Bypass"
        summary: >
          The code carries the literal pattern of confirmation bypass —
          auto-approve flags, "yes" wired into the prompt, env-variable or
          flag short-circuits around an existing confirmation step.
        rule_ids: [K5]
        cross_references: [K4]

      - id: post-init-capability-escalation
        title: "Post-Init Capability Escalation"
        summary: >
          The server uses capabilities or scopes it didn't declare during
          initialization — a privilege escalation that defeats the user's
          consent at handshake time.
        rule_ids: [I12]
        cross_references: [G5, K15]

      - id: tool-position-and-progressive-poisoning
        title: "Tool-Position & Progressive Poisoning"
        summary: >
          Bias attacks on the user's review process: position-of-tool bias
          exploitation (hiding dangerous tools mid-list), progressive context
          poisoning that shifts norms over a long session.
        rule_ids: [M5, M6]
        cross_references: [I16]

      - id: trust-delegation-confusion
        title: "Trust-Delegation Confusion"
        summary: >
          MCP gateways and protocol bridges (A2A) blur which principal made a
          decision, leaving the user unable to refuse a step that was implicitly
          approved.
        rule_ids: [Q15]
        cross_references: [Q6, K14]

  # ═══════════════════════════════════════════════════════════════════════════
  # 8. AUDIT & LOGGING
  # ═══════════════════════════════════════════════════════════════════════════
  - id: audit-logging
    title: "Audit & Logging"
    summary: |
      Missing or compromised audit trails — the EU AI Act Art. 12 surface.
      Without audit, every other rule's evidence is unverifiable post-incident.
    frameworks: [MCP09, ASI10, CoSAI-T12, MAESTRO-L5, EU-AI-Act-Art-12]
    sub_categories:

      - id: absent-or-unstructured-logging
        title: "Absent or Unstructured Logging"
        summary: >
          The handler is reachable but does not emit a structured, retainable
          log record — console.log, no logger, or a logger present but not
          wired into the registered handler.
        rule_ids: [K1]
        cross_references: [E3]

      - id: log-destruction
        title: "Log Destruction"
        summary: >
          Code paths actively delete, truncate, rotate-without-archive, or
          disable logging — destruction of the trail Art. 12 demands.
        rule_ids: [K2]
        cross_references: [K3]

      - id: log-tampering
        title: "Log Tampering"
        summary: >
          Code paths edit, censor, or rewrite log records after emission —
          the integrity of the trail is no longer guaranteed.
        rule_ids: [K3]
        cross_references: [K2]

      - id: insufficient-audit-context
        title: "Insufficient Audit Context"
        summary: >
          Logs exist but lack the fields a reviewer needs to reconstruct the
          incident — no correlation id, no caller identity, no parameters.
        rule_ids: [K20]
        cross_references: [K1]

      - id: behavioral-anomaly-signals
        title: "Behavioral Anomaly Signals"
        summary: >
          Live-connection signals that imply a logging or monitoring gap —
          response-time outliers that nobody is alerting on.
        rule_ids: [E3]
        cross_references: [K1]

  # ═══════════════════════════════════════════════════════════════════════════
  # 9. MULTI-AGENT SECURITY
  # ═══════════════════════════════════════════════════════════════════════════
  - id: multi-agent-security
    title: "Multi-Agent Security"
    summary: |
      Cross-agent propagation, shared-memory poisoning, and capability
      composition — attacks that emerge only when MCP is the integration
      layer between multiple agents.
    frameworks: [MCP01, MCP04, MCP05, ASI07, CoSAI-T9, MAESTRO-L7, EU-AI-Act-Art-14, AML.T0058, AML.T0059]
    sub_categories:

      - id: same-server-lethal-trifecta
        title: "Same-Server Lethal Trifecta"
        summary: >
          A single server combines private data + untrusted content + external
          comms — the defining lethal pattern. Score is capped at 40 when
          detected.
        rule_ids: [F1]
        cross_references: [I13, F7]

      - id: persistent-loop-poisoning
        title: "Persistent Loop Poisoning"
        summary: >
          Write+read on the same data store enables persistent prompt
          injection: the attacker poisons stored content once; the model
          re-executes it on every subsequent read.
        rule_ids: [F6]
        cross_references: [G1, K14]

      - id: cross-agent-config-poisoning
        title: "Cross-Agent Config Poisoning"
        summary: >
          One agent writes to another agent's MCP config (.claude/, .cursor/,
          .gemini/, ~/.mcp.json) — a documented RCE family covering
          CVE-2025-53773 and similar.
        rule_ids: [J1]
        cross_references: [Q4, L4]

      - id: shared-state-credential-propagation
        title: "Shared-State Credential Propagation"
        summary: >
          A credential or capability propagates between agents through a
          shared scratchpad / vector store / working memory — the multi-agent
          extension of cross-boundary credential sharing.
        rule_ids: [K14]
        cross_references: [K8, H3]

      - id: collusion-preconditions
        title: "Collusion Preconditions"
        summary: >
          Static enablers of runtime agent collusion — tools that read AND
          write the same broker channel without trust-zone declarations.
        rule_ids: [K15, H3]
        cross_references: [K14]

      - id: capability-composition-attack
        title: "Capability Composition Attack"
        summary: >
          A specific multi-server capability composition becomes dangerous
          where the individual servers were not — the cross-server ARI
          family (P10 capability composition).
        rule_ids: [Q10]
        cross_references: [F7, I13]

  # ═══════════════════════════════════════════════════════════════════════════
  # 10. PROTOCOL & TRANSPORT
  # ═══════════════════════════════════════════════════════════════════════════
  - id: protocol-transport
    title: "Protocol & Transport"
    summary: |
      JSON-RPC and transport-layer attacks — batch abuse, notification flood,
      session hijacking, request smuggling, and downgrade attacks against the
      MCP wire protocol.
    frameworks: [MCP07, CoSAI-T7, MAESTRO-L4, EU-AI-Act-Art-15, AML.T0061]
    sub_categories:

      - id: insecure-transport
        title: "Insecure Transport"
        summary: >
          The MCP server is reachable over plain HTTP / unencrypted WebSocket,
          or fails MCP spec-compliance checks that govern transport hygiene.
        rule_ids: [E2, F4]
        cross_references: [I15]

      - id: jsonrpc-batching-and-flooding
        title: "JSON-RPC Batching & Flooding"
        summary: >
          Misuse of JSON-RPC batch / notification semantics — batch-request
          abuse, notification flooding, request-id collisions, cancellation
          races, incomplete handshakes that pin server resources.
        rule_ids: [N1, N2, N3, N8, N10]
        cross_references: [K16]

      - id: protocol-version-and-method-confusion
        title: "Protocol Version & Method Confusion"
        summary: >
          Negotiation-time attacks — capability downgrade deception, protocol
          version downgrade, JSON-RPC method-name confusion that lets a call
          dispatch to the wrong handler.
        rule_ids: [N5, N11, N15]
        cross_references: [F4]

      - id: streaming-and-session-hijacking
        title: "Streaming & Session Hijacking"
        summary: >
          SSE reconnection hijack, progress-token prediction injection, HTTP
          chunked-transfer smuggling — transport-state attacks against the
          long-lived MCP session.
        rule_ids: [N6, N7, N13]
        cross_references: [I15]

      - id: sampling-and-elicitation-abuse
        title: "Sampling & Elicitation Abuse"
        summary: >
          Spec-sanctioned protocol primitives turned into amplifiers —
          sampling cost amplification, elicitation flows that redirect users
          to attacker-controlled URLs.
        rule_ids: [I8, I10]
        cross_references: [I7, I9]

      - id: localhost-and-concurrency-hijack
        title: "Localhost & Concurrency Hijack"
        summary: >
          Cross-process / cross-protocol attacks on local MCP services — port
          hijacking on localhost between concurrent server instances on the
          loopback interface.
        rule_ids: [Q3]
        cross_references: [I15]

  # ═══════════════════════════════════════════════════════════════════════════
  # 11. DENIAL OF SERVICE
  # ═══════════════════════════════════════════════════════════════════════════
  - id: denial-of-service
    title: "Denial of Service"
    summary: |
      Resource exhaustion and cost amplification — recursion bombs, missing
      timeouts, response-payload bombs, model-inference cost amplification.
    frameworks: [MCP07, ASI08, CoSAI-T10, MAESTRO-L4, EU-AI-Act-Art-15]
    sub_categories:

      - id: recursion-and-loop-bombs
        title: "Recursion & Loop Bombs"
        summary: >
          Code paths with unbounded recursion or unbounded loops — depth limit
          missing, no termination condition reachable from user input.
        rule_ids: [K16, M4]
        cross_references: [K17]

      - id: timeout-and-circuit-breaker-gaps
        title: "Timeout & Circuit-Breaker Gaps"
        summary: >
          Outbound calls / handler executions without timeouts or circuit
          breakers — single hung dependency stalls every concurrent caller.
        rule_ids: [K17]
        cross_references: [K16, K19]

      - id: container-resource-exhaustion
        title: "Container Resource Exhaustion"
        summary: >
          The container has no cgroup limits or sandbox enforcement, so a
          single misbehaving handler exhausts the host.
        rule_ids: [P9, K19]
        cross_references: [K17]

      - id: response-payload-amplification
        title: "Response Payload Amplification"
        summary: >
          Tool responses are unboundedly large or deeply structured — a
          structure bomb that explodes the model's context window or the
          client's parser.
        rule_ids: [M7]
        cross_references: [E4]

      - id: inference-cost-amplification
        title: "Inference Cost Amplification"
        summary: >
          The MCP server triggers AI inference on each call (sampling,
          chained tool invocations) without rate or cost ceilings, weaponizing
          the user's billing.
        rule_ids: [M8]
        cross_references: [I8, I7]

      - id: tool-surface-bloat
        title: "Tool Surface Bloat"
        summary: >
          The server exposes excessive tools (>50) — each one is a parsing
          and prompt cost on every interaction.
        rule_ids: [E4]
        cross_references: [I16]

  # ═══════════════════════════════════════════════════════════════════════════
  # 12. CONTAINER & RUNTIME
  # ═══════════════════════════════════════════════════════════════════════════
  - id: container-runtime
    title: "Container & Runtime"
    summary: |
      Container and runtime-environment misconfigurations — Docker socket
      mounts, dangerous capabilities, host filesystem mounts, host network mode,
      crypto / TLS hardening failures specific to the container layer.
    frameworks: [MCP07, CoSAI-T8, MAESTRO-L4, EU-AI-Act-Art-15]
    sub_categories:

      - id: container-escape-vectors
        title: "Container Escape Vectors"
        summary: >
          The container is configured with privileges that defeat its
          isolation: docker.sock mount, dangerous Linux capabilities,
          LD_PRELOAD-style shared library hijacking.
        rule_ids: [P1, P2, P6]
        cross_references: [K19]

      - id: host-mount-and-network
        title: "Host Mount & Network"
        summary: >
          Sensitive host filesystem mounted into the container, or host
          network mode bypassing namespace isolation.
        rule_ids: [P7, P10]
        cross_references: [I11]

      - id: cloud-metadata-access
        title: "Cloud Metadata Access"
        summary: >
          The container can reach the cloud metadata service (169.254.169.254)
          and harvest the instance role / credentials. SSRF's cloud-native
          counterpart.
        rule_ids: [P3]
        cross_references: [C3]

      - id: tls-and-crypto-misconfig
        title: "TLS & Crypto Misconfig"
        summary: >
          TLS validation bypass, insecure crypto modes, static IVs — the
          runtime crypto hardening surface that the dependency-level checks
          (D6) cannot see.
        rule_ids: [P4, P8]
        cross_references: [D6]

      - id: secrets-in-image
        title: "Secrets In Image"
        summary: >
          Build-time secrets baked into container image layers — visible
          forever to anyone who can pull the image.
        rule_ids: [P5]
        cross_references: [C5]

      - id: privileged-roots-and-extensions
        title: "Privileged Roots & Extensions"
        summary: >
          The MCP server declares roots at sensitive system directories or
          ships through a desktop-extension trust chain that re-pivots into
          the host.
        rule_ids: [I11, Q7]
        cross_references: [P7]

  # ═══════════════════════════════════════════════════════════════════════════
  # 13. MODEL MANIPULATION
  # ═══════════════════════════════════════════════════════════════════════════
  - id: model-manipulation
    title: "Model Manipulation"
    summary: |
      Attacks that target how the model TOKENIZES or REASONS — special-token
      injection, tokenizer-boundary manipulation, reasoning loops, schema-level
      weaknesses that AI agents exploit.
    frameworks: [MCP01, MCP06, MCP07, ASI01, ASI08, CoSAI-T4, CoSAI-T10, MAESTRO-L1, EU-AI-Act-Art-15, AML.T0054, AML.T0056]
    sub_categories:

      - id: tokenizer-boundary-attacks
        title: "Tokenizer Boundary Attacks"
        summary: >
          The payload is crafted at the tokenizer boundary — special tokens
          embedded in metadata, "TokenBreak" boundary manipulation that
          smuggles directives past safety filters.
        rule_ids: [M1, M2]
        cross_references: [A7]

      - id: reasoning-extraction
        title: "Reasoning Extraction"
        summary: >
          Model-specific system-prompt extraction — attacks that expose the
          model's internal deliberation context to the calling user.
        rule_ids: [M9]
        cross_references: [G4, M4]

      - id: missing-input-validation
        title: "Missing Input Validation"
        summary: >
          The schema permits inputs the model fills in unchecked: no
          constraints on a string, no constraint on a number, no schema
          at all.
        rule_ids: [B1, B4]
        cross_references: [B6]

      - id: dangerous-parameter-shape
        title: "Dangerous Parameter Shape"
        summary: >
          The schema names parameters in ways that prime the model toward
          dangerous values — file path / command / SQL / URL — or accepts
          too many parameters for a reviewer to keep in mind.
        rule_ids: [B2, B3]
        cross_references: [J3]

      - id: unconstrained-and-dangerous-defaults
        title: "Unconstrained & Dangerous Defaults"
        summary: >
          additionalProperties: true, or default values that ship with
          dangerous capabilities pre-enabled (recursive: true, allow_overwrite:
          true, disable_ssl_verify: true).
        rule_ids: [B6, B7]
        cross_references: [J3]

      - id: information-disclosure-via-debug
        title: "Information Disclosure Via Debug Surface"
        summary: >
          /health/detailed, /metrics, /debug endpoints leak OS, host, and
          environment information that would otherwise have to be inferred
          (CVE-2026-29787 family).
        rule_ids: [J4]
        cross_references: [C6]

# ─── Retired Rules ──────────────────────────────────────────────────────────
#
# These rules remain in `rules/` with `enabled: false`. They are NOT placed in
# any sub-category and do NOT appear in scan output. The reason is the source-
# of-truth justification for retirement — derived from `agent_docs/detection-
# rules.md` plus the current YAML state for I14.

retired_rules:
  - { id: I14, reason: "Static analysis cannot reliably reconstruct the longitudinal capability-drift signal — covered by G6 at scan-time and by the drift-history view at the API layer." }
  - { id: M3,  reason: "Fully duplicated by A1's linguistic scoring; A1 is more precise on this surface." }
  - { id: O1,  reason: "Pure keyword matching; covered structurally by C3 / L9 / G7 taint analysis." }
  - { id: O2,  reason: "Custom HTTP headers are universal; covered by C3 taint flow without the FP cost." }
  - { id: O3,  reason: "Encoding before an outbound API call is legitimate and universal; not separable statically." }
  - { id: O7,  reason: "Module-level state is normal in Node.js; cross-session leakage requires runtime analysis we don't have." }
  - { id: Q1,  reason: "Cannot statically verify constraint loss across protocol boundaries." }
  - { id: Q2,  reason: "Fully duplicated by C12 (Unsafe Deserialization)." }
  - { id: Q5,  reason: "Trust-delegation patterns are architecturally legitimate; rule was too abstract to be falsifiable." }
  - { id: Q8,  reason: "Token reuse across protocols is common and often intentional." }
  - { id: Q9,  reason: "Dynamic workflow modification is legitimate in agentic frameworks." }
  - { id: Q11, reason: "Code-generation tools legitimately return code in responses." }
  - { id: Q12, reason: "Niche pattern; duplicated by Q7 (Extension Privilege Escalation)." }
  - { id: Q14, reason: "Pattern is unmatchable via static analysis; rule never fires." }
