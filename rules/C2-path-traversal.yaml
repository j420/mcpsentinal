id: C2
name: Path Traversal
category: code-analysis
severity: critical
owasp: MCP05-privilege-escalation
mitre: null
detect:
  type: typed
    # Direct concatenation with user input (variable name heuristic)
    - "(?i)fs\\.(read|write|append|unlink|rm|mkdir|access|stat|chmod|chown).*\\+.*(?:req|input|param|args|body|query|user)"
    - "(?i)path\\.join\\s*\\([^)]*(?:req|input|param|args|body|query|user)"
    - "(?i)open\\s*\\([^)]*(?:req|input|param|user|args|body)"
    - "(?i)readFile\\s*\\([^)]*(?:req|input|param|args|body)"
    - "(?i)writeFile\\s*\\([^)]*(?:req|input|param|args|body)"
    # Literal traversal sequences anywhere in the codebase
    - "\\.\\./\\.\\."
    - "\\.\\.%2[Ff]"
    - "\\.\\.%5[Cc]"
    - "%2e%2e[%/\\\\]"
    - "\\.\\.\\\\\\.\\.\\b"
    # Null byte injection (terminates path in C-based fs implementations)
    - "\\\\x00|\\\\u0000|%00"
    # Python open() with traversal-prone patterns
    - "(?i)open\\s*\\(\\s*(?:os\\.path\\.join|f['\"])[^)]*\\$"
    # Allowing root-level paths directly from input
    - "(?i)(?:base_?dir|root_?dir|allowed_?path)\\s*[=+].*(?:req|input|param)"
remediation: "Use path.resolve() to canonicalize paths, then verify the result starts with the intended base directory. Reject any input containing '..', null bytes, or encoded variants. Never concatenate user input into file paths."
test_cases:
  true_positive:
    - { description: "Source code contains fs.readFile(path.join(baseDir, req.body.filename)) without path validation", expected: true }
    - { description: "Source code contains literal '../../etc/passwd' path traversal sequence", expected: true }
  true_negative:
    - { description: "Source code uses path.resolve() followed by startsWith(baseDir) check before file access", expected: false }
    - { description: "Source code reads a hardcoded config file path with no user input involved", expected: false }
enabled: true
