id: Q9
name: Agentic Workflow DAG Manipulation
category: cross-ecosystem-emergent
severity: critical
owasp: MCP05-privilege-escalation
mitre: AML.T0058

# THREAT INTELLIGENCE (Senior Security Architect — Agentic Workflows):
#
# Agentic AI systems model execution as directed graphs (LangGraph StateGraph,
# AutoGen GroupChat, CrewAI Task DAG). MCP tools that can modify the execution
# graph — add nodes, change edges, skip steps, or alter execution order —
# enable WORKFLOW MANIPULATION attacks.
#
# ATTACK MODEL:
#   1. MCP tool is called during agent workflow execution
#   2. Tool modifies the workflow state/graph (adds a node, changes routing)
#   3. Next execution step follows the attacker's modified path
#   4. Safety checks, approval gates, or validation steps are bypassed
#
# This is distinct from agent impersonation (Q6) — here the attacker modifies
# the WORKFLOW STRUCTURE, not the agent identity.
#
# EVIDENCE:
# - Trend Micro: "An attacker with access could replace a running subgraph
#   with a malicious one ('subgraph impersonation')" (2026)
# - arXiv 2602.19555: "Agentic Supply Chain forms a cyclic graph... invocation
#   side effects may re-enter the system as discoverable inputs"
# - arXiv 2510.23883: "flow disruption via carefully crafted prompt injection
#   silently alters the running state toward a malicious goal"
#
# Intelligence: Trend Micro (2026), arXiv 2602.19555 (Feb 2026),
# arXiv 2510.23883 (Oct 2025), OWASP ASI01 Agent Goal Hijack

detect:
  type: typed
remediation: "MCP tools must NOT modify agentic workflow graphs, execution order, or routing during runtime. Workflow structure should be immutable once execution begins. If dynamic workflow modification is required, implement: (1) approval gates that require human confirmation before graph mutations, (2) integrity checks that validate the workflow graph against a known-good baseline after each step, (3) audit logging of all graph modifications with rollback capability. Reference: arXiv 2602.19555, Trend Micro subgraph impersonation attack (2026)."
test_cases:
  true_positive:
    - { description: "MCP tool modifies LangGraph StateGraph by adding new nodes during execution", expected: true }
    - { description: "Source code allows MCP tool to skip validation steps in workflow pipeline", expected: true }
  true_negative:
    - { description: "Source code defines a static LangGraph workflow at initialization time", expected: false }
    - { description: "MCP tool that reads workflow state without modifying it", expected: false }
enabled: false
retirement_rationale: "Retired 2026-04-07. Detection matched workflow graph modification keywords (add_edge/add_node/modify) with user input references. Dynamic workflow construction is the core purpose of LangGraph, AutoGen, and CrewAI — every agentic application modifies graphs at runtime. Estimated false-positive rate >80%. Cannot distinguish malicious graph manipulation from legitimate dynamic workflow generation. Workflow integrity is better enforced through schema validation and allowlists at the framework level, not static code scanning."
