id: E3
name: Response Time Anomaly
category: behavioral-analysis
severity: low
owasp: MCP09-logging-monitoring
mitre: null
detect:
  type: behavioral
  conditions:
    check: response_time_exceeds
    threshold_ms: 10000
  context: metadata
remediation: "Investigate slow response times. Unusually slow responses to tools/list may indicate heavy computation, external API calls, or resource exhaustion. Consider adding timeouts."
enabled: true
