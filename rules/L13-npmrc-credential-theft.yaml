id: L13
name: Build Credential File Theft
category: supply-chain-advanced
severity: critical
owasp: MCP07-insecure-configuration
mitre: AML.T0057

# THREAT INTELLIGENCE (P1 Researcher — Supply Chain):
# Source: Shai-Hulud worm (Sept 2025 — exfiltrated .npmrc tokens),
#         Unit42 GitHub Actions secret exfiltration research (March 2025),
#         npm security advisory on .npmrc token handling (2024),
#         Trellix "npm Account Hijacking" research (2025)
#
# THE ATTACK: MCP server build environments contain credential files that
# grant publish access to package registries and cloud services:
#   .npmrc (contains //registry.npmjs.org/:_authToken=...)
#   .pypirc (contains [pypi] password=...)
#   ~/.docker/config.json (Docker Hub credentials)
#   ~/.config/gh/hosts.yml (GitHub CLI token)
#   .env, .env.local (API keys, database URLs)
#
# Attackers read these files during build/install to steal publish credentials.
# With a stolen npm publish token, the attacker can publish backdoored versions
# of the MCP server to npm, compromising all downstream users.
#
# The Shai-Hulud worm specifically targeted .npmrc files to steal tokens and
# use them for worm propagation across the npm ecosystem.
#
# DIFFERENCE FROM C5 (hardcoded secrets): C5 detects secrets in source.
# DIFFERENCE FROM L9 (CI exfiltration): L9 detects env var exfiltration.
# L13 detects patterns that read CREDENTIAL FILES from the build environment.

detect:
  type: regex
  patterns:
    # Reading .npmrc for auth tokens
    - "(?i)(?:readFileSync|readFile|open|cat).*(?:\\.npmrc|npmrc)(?!.*test)"
    - "(?i)(?:readFileSync|readFile|open|cat).*(?:\\.pypirc|pip\\.conf)"
    # Reading Docker credentials
    - "(?i)(?:readFileSync|readFile|open|cat).*(?:\\.docker/config\\.json|docker.*credentials)"
    # Reading GitHub CLI credentials
    - "(?i)(?:readFileSync|readFile|open|cat).*(?:\\.config/gh/hosts\\.yml|gh/config)"
    # Parsing auth tokens from credential files
    - "(?i)(?:_authToken|authToken|auth_token|password|token).*(?:parse|split|match|exec|regex).*(?:npmrc|pypirc|credentials)"
    # Accessing home directory credential files generically
    - "(?i)(?:os\\.homedir|process\\.env\\.HOME|~/).*(?:readFile|readFileSync|cat|open).*(?:\\.npmrc|\\.pypirc|\\.docker|\\.ssh|\\.aws)"
    # Sending credential file contents over network
    - "(?i)(?:readFile|readFileSync).*(?:\\.npmrc|\\.pypirc|\\.docker|\\.ssh|\\.aws).*(?:fetch|axios|request|http|post)"
    # Grep/find for credential files during build
    - "(?i)(?:find|grep|locate).*(?:_authToken|auth_token|password|secret|private_key).*(?:/home|~|\\$HOME)"
  context: source_code
  exclude_patterns:
    - "(?i)test|spec|mock|fixture|example"
    - "(?i)(?:write|create|generate).*\\.npmrc"
    - "(?i)npm\\s+config\\s+set"
remediation: "Never read credential files (.npmrc, .pypirc, .docker/config.json) from within MCP server code or build scripts. Use environment variables for auth tokens, not file-based credentials. In CI, use OIDC tokens with short-lived credentials. Audit all dependencies for credential file access patterns. Run builds in isolated containers without access to host credential files."
test_cases:
  true_positive:
    - { description: "Build script reads .npmrc to extract _authToken and sends it via HTTP", expected: true }
    - { description: "Source code reads ~/.docker/config.json and parses authentication credentials", expected: true }
    - { description: "Code searches HOME directory for files containing auth tokens", expected: true }
  true_negative:
    - { description: "npm config set script that writes to .npmrc for CI setup", expected: false }
    - { description: "Test file creates mock .npmrc for testing npm behavior", expected: false }
enabled: true
