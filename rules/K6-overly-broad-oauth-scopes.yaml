id: K6
name: Overly Broad OAuth Scopes
category: compliance-governance
severity: high
owasp: MCP06-excessive-permissions
mitre: AML.T0054

# FRAMEWORK MAPPING (P11 Compliance Mapper):
# - OWASP ASI03: Identity & Privilege Abuse — excessive delegated permissions
# - CoSAI MCP-T1: Improper Authentication — OAuth weaknesses
# - CoSAI MCP-T2: Missing Access Control — excessive permissions
# - CSA AICM: Identity & Access Management domain
# - ISO 27001 A.5.15: Access control — least privilege principle
# - ISO 27001 A.5.18: Access rights — minimum necessary
# - NIST AI RMF MAP 1.1: Document scope (scopes should match stated purpose)
#
# THE GAP: H1 detects OAuth implementation flaws (implicit flow, ROPC, etc.)
# but not overly broad SCOPE requests. An MCP server requesting
# scope="admin write:all read:all" when it only needs "read:user"
# violates least privilege. A compromised token with broad scopes
# enables lateral escalation.

detect:
  type: typed
    # Wildcard or admin scopes
    - "(?i)scope\\s*[:=]\\s*[\"'][^\"']*(?:\\*|all|admin|root|superuser|full[_\\s-]?access)[^\"']*[\"']"
    - "(?i)scope\\s*[:=]\\s*[\"']\\s*\\*\\s*[\"']"
    # Overly broad permission sets
    - "(?i)scope\\s*[:=]\\s*[\"'][^\"']*(?:write|delete|manage|execute).*(?:write|delete|manage|execute)[^\"']*[\"']"
    # Requesting all permissions when description suggests limited use
    - "(?i)(?:openid|profile|email).*(?:admin|write:all|manage:all|delete)"
    # AWS/GCP/Azure overly broad role assignments
    - "(?i)(?:iam|role|policy).*(?:AdministratorAccess|\\*:\\*|Action.*\\*)"
    - "(?i)(?:role|permission)\\s*[:=]\\s*[\"'](?:owner|admin|superadmin|root)[\"']"
remediation: "Request the minimum OAuth scopes needed for functionality. Use read-only scopes when write access isn't required. Break broad scopes into specific, task-scoped permissions. Use short-lived, JIT (just-in-time) credentials. Required by ISO 27001 A.5.15 (least privilege), OWASP ASI03, and CoSAI MCP-T2."
test_cases:
  true_positive:
    - { description: "Source code requests OAuth scope='*' giving full access to all APIs", expected: true }
    - { description: "Source code sets role='admin' with AdministratorAccess policy", expected: true }
  true_negative:
    - { description: "Source code requests scope='read:user profile' with minimum privileges", expected: false }
    - { description: "Test fixture configures admin scope for integration test setup", expected: false }
enabled: true
