id: K19
name: Missing Runtime Sandbox Enforcement
category: compliance-governance
severity: high
owasp: MCP07-insecure-config
mitre: AML.T0054

# FRAMEWORK MAPPING (P11 Compliance Mapper):
# - CoSAI MCP-T8: Network Binding/Isolation Failures — sandbox enforcement
# - CoSAI: "Containers alone are insufficient" — need seccomp/AppArmor
# - OWASP ASI05: Unexpected Code Execution — sandbox prevents escape
# - MAESTRO L4: Deployment & Infrastructure — container escape
# - ISO 27001 A.8.22: Network segregation
# - EU AI Act Art. 15: Robustness — resilient architecture
#
# WHAT WE DETECT STATICALLY: While runtime sandbox enforcement is a
# deployment concern, we can detect source code and configuration patterns
# that indicate ABSENCE of sandboxing or ACTIVE sandbox escape:
#   1. Docker running with --privileged flag
#   2. Disabling security profiles (seccomp, AppArmor, SELinux)
#   3. Mounting host filesystem/Docker socket into container
#   4. Running as root without dropping privileges

detect:
  type: regex
  patterns:
    # Docker privileged mode
    - "(?i)(privileged|--privileged)\\s*[:=]\\s*(true|yes|1)"
    - "(?i)cap[_\\s-]?add.*(?:SYS_ADMIN|SYS_PTRACE|NET_RAW|ALL)"
    # Disabling security profiles
    - "(?i)(seccomp|apparmor|selinux)[_\\s-]?(profile|policy)?\\s*[:=]\\s*(?:unconfined|disabled|off|permissive)"
    - "(?i)--security-opt\\s*(?:seccomp|apparmor|label)[:=](?:unconfined|disabled)"
    # Mounting dangerous host paths
    - "(?i)(?:volumes?|mount|bind).*(?:/var/run/docker\\.sock|/proc|/sys|/dev|/:/)"
    - "(?i)(?:volume|mount).*[\"']\\s*/\\s*:\\s*/[^\"']*[\"']"
    # Running as root without dropping
    - "(?i)(?:USER\\s+root|user\\s*[:=]\\s*[\"']?root[\"']?)(?!.*(?:gosu|su-exec|drop|USER\\s+\\w))"
    - "(?i)(run[_\\s-]?as[_\\s-]?root|EUID.*0|uid.*0)(?!.*(?:drop|setuid|seteuid|change.?user))"
    # Network namespace sharing (host network)
    - "(?i)(network[_\\s-]?mode|--net|--network)\\s*[:=]\\s*[\"']?host[\"']?"
  context: source_code
  exclude_patterns:
    - "(?i)test|spec|mock|fixture"
    - "(?i)rootless|unprivileged|drop[_\\s-]?privilege|gosu|su-exec"
remediation: "Run MCP servers in sandboxed containers with: (1) No --privileged flag, (2) Minimal Linux capabilities (drop ALL, add only needed), (3) Read-only root filesystem, (4) Non-root user, (5) Seccomp/AppArmor profiles enabled, (6) No host mounts except data volumes. CoSAI warns containers alone are insufficient — add seccomp profiles. Required by CoSAI MCP-T8 and ISO 27001 A.8.22."
test_cases:
  true_positive:
    - { description: "Dockerfile runs as root with privileged=true and SYS_ADMIN capability", expected: true }
    - { description: "docker-compose.yml mounts /var/run/docker.sock into the container", expected: true }
    - { description: "Configuration sets seccomp profile to 'unconfined' disabling all security filtering", expected: true }
  true_negative:
    - { description: "Dockerfile creates non-root user and drops all capabilities except NET_BIND_SERVICE", expected: false }
    - { description: "Test docker-compose uses privileged mode for CI integration testing only", expected: false }
enabled: true
