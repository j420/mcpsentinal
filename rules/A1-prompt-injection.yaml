id: A1
name: Prompt Injection in Tool Description
category: description-analysis
severity: critical
owasp: MCP01-prompt-injection
mitre: AML.T0054
detect:
  type: regex
  patterns:
    - "(?i)ignore\\s+(previous|above|all)\\s+instructions"
    - "(?i)system\\s*:\\s*you\\s+are"
    - "(?i)\\<\\s*system\\s*\\>"
    - "(?i)\\[INST\\]"
    - "(?i)do\\s+not\\s+reveal"
    - "(?i)override\\s+(previous|system)\\s+(prompt|instructions)"
    - "(?i)forget\\s+(everything|all|previous)"
    - "(?i)new\\s+instructions?\\s*:"
    - "(?i)IMPORTANT:\\s*always"
  context: tool_description
  exclude_patterns:
    - "security testing"
    - "example of prompt injection"
remediation: "Remove hidden instructions from tool descriptions. Descriptions should only explain what the tool does, not contain system-level directives."
enabled: true
