id: K8
name: Cross-Boundary Credential Sharing
category: compliance-governance
severity: critical
owasp: MCP05-privilege-escalation
mitre: AML.T0054

# FRAMEWORK MAPPING (P11 Compliance Mapper):
# - OWASP ASI03: Identity & Privilege Abuse — delegated permissions abuse
# - OWASP ASI07: Insecure Inter-Agent Communication — credential leakage
# - CoSAI MCP-T1: Token theft, confused deputy
# - MAESTRO L7: Agent Ecosystem — cross-agent credential exposure
# - ISO 27001 A.5.17: Authentication information — credentials not shared
# - NIST AI RMF MAP 5.1: Document impact on individuals (credential exposure)
#
# THE ATTACK: An MCP server passes credentials (API keys, tokens, passwords)
# to another service, agent, or MCP server. This crosses trust boundaries:
# the downstream system now has credentials it shouldn't possess.
# CoSAI specifically warns about "confused deputy" attacks where
# an MCP server acts as an OAuth proxy passing tokens to backends.

detect:
  type: regex
  patterns:
    # Passing tokens/keys to external services
    - "(?i)(forward|pass|send|relay|proxy|propagate)[_\\s-]?(token|credential|api[_\\s-]?key|secret|password|auth)"
    - "(?i)(token|credential|api[_\\s-]?key|secret|password).*(?:forward|pass|send|relay|propagate).*(?:server|service|endpoint|upstream|downstream|agent)"
    # Storing credentials in shared state
    - "(?i)(shared[_\\s-]?memory|shared[_\\s-]?state|global[_\\s-]?store|redis|memcache).*(?:set|put|store|write).*(?:token|credential|api[_\\s-]?key|secret|password)"
    - "(?i)(?:token|credential|api[_\\s-]?key|secret|password).*(?:shared[_\\s-]?memory|shared[_\\s-]?state|global[_\\s-]?store)"
    # Embedding credentials in tool responses
    - "(?i)(return|respond|output|result).*(?:token|credential|api[_\\s-]?key|secret|password|bearer)"
    # Cross-server credential injection
    - "(?i)(mcp|server|agent)[_\\s-]?(?:config|connection).*(?:token|credential|api[_\\s-]?key|auth[_\\s-]?header)"
  context: source_code
  exclude_patterns:
    - "(?i)test|spec|mock|fixture"
    - "(?i)redact|mask|sanitize|hash|encrypt|vault"
    - "(?i)token.?exchange|rfc.?8693|delegation.?token"
remediation: "Never forward, share, or embed credentials across trust boundaries. Use OAuth token exchange (RFC 8693) to create scoped, delegated tokens instead of passing original credentials. Never include credentials in tool responses. Required by ISO 27001 A.5.17 and OWASP ASI03."
test_cases:
  true_positive:
    - { description: "Source code forwards user's bearer token to a downstream MCP server connection", expected: true }
    - { description: "Source code stores API key in shared Redis cache accessible by other services", expected: true }
    - { description: "Source code returns user's credential in tool response to the agent", expected: true }
  true_negative:
    - { description: "Source code uses OAuth token exchange (RFC 8693) to create a scoped delegation token", expected: false }
    - { description: "Test fixture stores mock credentials in test-only Redis instance", expected: false }
enabled: true
