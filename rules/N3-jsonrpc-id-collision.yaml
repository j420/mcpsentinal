id: N3
name: JSON-RPC Request ID Collision
category: protocol-edge-cases
severity: high
owasp: MCP07-insecure-config
mitre: AML.T0054
detect:
  type: typed
remediation: "Use cryptographically random or UUID-based request IDs to prevent collision attacks. Do not use sequential integers — an attacker can predict the next ID and inject a response before the legitimate server responds (response spoofing). Validate that response IDs match pending request IDs. Reference: JSON-RPC 2.0 Section 4.1 — 'id' must be unique within a session."
test_cases:
  true_positive:
    - { description: "Source code uses auto-incrementing integer counter for JSON-RPC request IDs (let requestId = 0; requestId++)", expected: true }
    - { description: "Python MCP client uses self._request_id += 1 for sequential message IDs", expected: true }
  true_negative:
    - { description: "Source code generates request IDs using crypto.randomUUID() for each message", expected: false }
    - { description: "Client uses nanoid() for generating unpredictable request identifiers", expected: false }
intelligence_source: "CVE-2025-6515 (session ID prediction in oatpp-mcp), JSON-RPC 2.0 spec Section 4.1"
enabled: true
