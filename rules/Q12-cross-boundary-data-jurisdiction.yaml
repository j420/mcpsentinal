id: Q12
name: Cross-Jurisdiction Data Routing via MCP
category: cross-ecosystem-emergent
severity: high
owasp: MCP04-data-exfiltration
mitre: T1020

# THREAT INTELLIGENCE (Senior Security Architect — Compliance Arbitrage):
#
# MCP servers can dynamically route tool calls to backend services in different
# jurisdictions. An MCP server in the US can proxy requests to a backend in a
# country with weaker data protection laws, effectively enabling COMPLIANCE
# ARBITRAGE — avoiding EU GDPR, Chinese CSL, or other data sovereignty laws.
#
# ATTACK MODEL:
#   1. MCP server advertises data processing capability
#   2. Tool call containing EU citizen PII is sent to the MCP server
#   3. Server routes the data to a processing backend in a third country
#      without adequate data protection measures
#   4. No single regulatory authority has full visibility
#
# Additionally: MCP servers with region-conditional logic that processes
# sensitive operations differently based on request origin, enabling split-
# jurisdiction attacks.
#
# EVIDENCE:
# - Sourcing Speak: "When an MCP connector retrieves data from a system hosted
#   in the EU to generate output processed by a model running on US infra, that
#   transfer will likely implicate data localization requirements" (Mar 2026)
# - Schellman: "Jurisdictional conflicts arise where complying with one set of
#   regulations simultaneously prevents meeting another set" (2025)
# - EU AI Act Art. 12: Record-keeping requirements for high-risk AI systems
#
# Intelligence: Sourcing Speak (Mar 2026), Schellman cross-border AI governance,
# EU AI Act, GDPR Art. 44-49 cross-border transfers

detect:
  type: typed
remediation: "MCP servers that handle personal or sensitive data must: (1) declare the geographic regions where data is processed in tool descriptions, (2) never route data to third-country backends without GDPR adequacy decisions or Standard Contractual Clauses, (3) log all cross-border data transfers with source/destination jurisdiction for audit, (4) implement data residency enforcement that rejects requests violating localization requirements. Reference: EU AI Act Art. 12, GDPR Art. 44-49."
test_cases:
  true_positive:
    - { description: "MCP server routes PII processing to different backends based on region without adequacy checks", expected: true }
    - { description: "Source code bypasses data sovereignty checks when routing to offshore processing endpoints", expected: true }
  true_negative:
    - { description: "MCP server with explicit GDPR compliance checks and data residency enforcement", expected: false }
    - { description: "CDN-based MCP server that routes to nearest region with adequate data protection", expected: false }
enabled: false
retirement_rationale: "Retired 2026-04-07. Detection matched chrome.runtime/browser.runtime API calls combined with MCP/tool/server keywords. Duplicates Q7 (Desktop Extension Privilege Chain) which provides broader extension security coverage. The pattern is too niche and produces false positives in legitimate browser extension MCP integrations (e.g., Claude browser extension, official Anthropic extensions). Estimated false-positive rate >50%. Extension-to-MCP bridging is better analyzed through capability graph inspection of the permission model."
