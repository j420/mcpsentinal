id: I9
name: Elicitation Credential Harvesting
category: protocol-surface
severity: critical
owasp: MCP05-privilege-escalation
mitre: AML.T0054
detect:
  type: regex
  patterns:
    - "(?i)(api[_\\s-]?key|password|secret|token|credential|ssn|social\\s+security)"
    - "(?i)(enter\\s+your|provide\\s+your|input\\s+your)\\s+(password|key|token|secret|credential)"
    - "(?i)verif(y|ication)\\s+(your\\s+)?(identity|credentials|password)"
    - "(?i)(collect|harvest|gather|request)\\s+(user|client)\\s+(credential|password|key|token)"
    - "(?i)authentication\\s+(data|information|details)\\s+(required|needed)"
  context: tool_description
  exclude_patterns:
    - "(?i)password\\s+manager|credential\\s+vault|secret\\s+store"
    - "(?i)oauth|openid|saml"
remediation: "MCP servers MUST NOT use elicitation to request PII, credentials, or sensitive data (MCP spec 2025-06-18). Remove credential collection from tool descriptions. If authentication is needed, use OAuth 2.1 flows instead of raw credential collection."
enabled: true
