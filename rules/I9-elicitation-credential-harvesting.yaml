id: I9
name: Elicitation Credential Harvesting
category: protocol-surface
severity: critical
owasp: MCP05-privilege-escalation
mitre: AML.T0054

# THREAT INTELLIGENCE NOTE (Sr. MCP Threat Researcher):
#
# The MCP Elicitation capability (spec 2025-06-18) allows servers to request
# structured user data via the AI client — essentially prompting the user for
# input at the protocol level. This creates a social engineering surface that
# bypasses traditional UI phishing detection because:
#
# 1. The request appears to come from a trusted MCP server, not a webpage
# 2. The AI client surfaces the elicitation in a trusted UI element
# 3. Users have already "trusted" the server (installed it), lowering guard
# 4. The elicitation can be framed as a necessary step for tool functionality
#
# ATTACK CATEGORIES COVERED:
# - Authentication credentials: passwords, API keys, tokens, secrets
# - MFA/OTP harvesting: 2FA codes, TOTP codes, SMS OTP, authenticator codes
#   → Most phishing chains now target MFA codes as the primary post-2FA vector
#   → Real-world precedent: EvilProxy, Evilginx2 harvest MFA codes in real-time
# - Financial PII: credit card numbers, CVV, expiry, banking details
# - Identity PII: SSN, date of birth, home address, government IDs
# - Recovery vectors: security questions, backup codes, recovery emails/phones
# - Biometric claims: fingerprint, face scan (suspicious for any MCP tool)
#
# MCP SPEC CONSTRAINT:
# The 2025-06-18 spec states elicitation is for "structured user data necessary
# for tool operation." Credential collection violates this — authentication
# should use OAuth 2.1, not raw credential elicitation.

detect:
  type: typed
    # ── Raw credential requests ────────────────────────────────────────────────
    - "(?i)(?:enter|provide|input|supply|type|submit)\\s+(?:your\\s+)?(?:password|passwd|passphrase|api[\\s_-]?key|secret[\\s_-]?key|access[\\s_-]?token|bearer[\\s_-]?token|private[\\s_-]?key|auth[\\s_-]?(?:token|key|code|secret))"
    - "(?i)(?:password|passwd|passphrase|credential|api[\\s_-]?key|secret|token)\\s+(?:is\\s+)?(?:required|needed|necessary|must\\s+be\\s+provided|to\\s+(?:continue|proceed|authenticate|access))"
    - "(?i)(?:collect|harvest|gather|capture|request|ask\\s+for)\\s+(?:user[\\s_-]?)?(?:credential|password|api[\\s_-]?key|secret|token|auth)"
    - "(?i)(?:verification|authentication)\\s+(?:of\\s+)?(?:your\\s+)?(?:credentials?|password|identity|api[\\s_-]?key)\\s+(?:required|needed|is\\s+necessary)"
    # ── MFA / OTP / 2FA harvesting ────────────────────────────────────────────
    # This is the primary modern phishing vector — attackers relay MFA codes in real-time
    - "(?i)(?:enter|provide|input|submit|type)\\s+(?:your\\s+)?(?:2fa|two[\\s_-]?factor|mfa|multi[\\s_-]?factor|otp|one[\\s_-]?time|totp|hotp|authenticator)\\s*(?:code|token|pin|number|passcode)"
    - "(?i)(?:2fa|two[\\s_-]?factor|mfa|multi[\\s_-]?factor|otp|one[\\s_-]?time[\\s_-]?password|verification)\\s+(?:code|token|pin|number)\\s+(?:required|needed|from\\s+your\\s+(?:app|phone|authenticator|sms))"
    - "(?i)(?:6|8)[\\s_-]?digit\\s+(?:code|number|pin|passcode)\\s+(?:from|sent\\s+to|in\\s+your)\\s+(?:your\\s+)?(?:phone|sms|authenticator|email|app)"
    - "(?i)(?:sms|text)[\\s_-]?(?:code|pin|otp|verification)\\s+(?:sent|from)\\s+(?:your|the)\\s+(?:phone|number|carrier|provider)"
    - "(?i)backup[\\s_-]?(?:code|key|token|recovery[\\s_-]?code)\\s+(?:from|for)\\s+(?:your\\s+)?(?:account|2fa|mfa|authenticator)"
    # ── Financial PII harvesting ──────────────────────────────────────────────
    - "(?i)(?:enter|provide|input|submit)\\s+(?:your\\s+)?(?:credit[\\s_-]?card|debit[\\s_-]?card|card[\\s_-]?number|payment[\\s_-]?card|visa|mastercard|amex)\\s*(?:number|details|info)?"
    - "(?i)(?:cvv|cvc|cvc2|cvv2|card[\\s_-]?verification|security[\\s_-]?code)\\s+(?:on\\s+the\\s+)?(?:back|front)?\\s+(?:of|from)\\s+(?:your\\s+)?(?:card|credit)"
    - "(?i)(?:bank|routing|account)[\\s_-]?(?:number|details|information|account[\\s_-]?number)\\s+(?:required|needed|to\\s+(?:process|verify|confirm|complete))"
    - "(?i)(?:expir(?:y|ation|es)|valid\\s+(?:through|until|thru))\\s+(?:date)?\\s+(?:on\\s+(?:your\\s+)?card|required|needed)"
    # ── Identity / government PII harvesting ──────────────────────────────────
    - "(?i)(?:social[\\s_-]?security|ssn|sin|national[\\s_-]?(?:id|insurance|identification))\\s*(?:number|no\\.?)?\\s*(?:required|needed|to\\s+verify)"
    - "(?i)(?:passport|driver[\\s_-]?(?:license|licence)|national[\\s_-]?id|government[\\s_-]?id)\\s+(?:number|details|scan|photo)\\s+(?:required|needed|to\\s+verify|for\\s+(?:kyc|verification|compliance))"
    - "(?i)(?:date[\\s_-]?of[\\s_-]?birth|dob|birthday|born\\s+on)\\s+(?:required|needed|to\\s+(?:verify|confirm|authenticate|access))"
    - "(?i)(?:home|residential|mailing|billing)[\\s_-]?(?:address|zip|postal|postcode)\\s+(?:required|needed|to\\s+(?:verify|confirm|ship|deliver))"
    # ── Security questions / recovery vectors ─────────────────────────────────
    - "(?i)(?:mother[']?s?|maternal)[\\s_-]?(?:maiden|birth)[\\s_-]?name\\s+(?:required|needed|for\\s+(?:verification|security|account\\s+recovery))"
    - "(?i)security[\\s_-]?question\\s+(?:answer|response)\\s+(?:required|needed|to\\s+(?:verify|reset|recover|unlock))"
    - "(?i)(?:first|childhood|elementary)[\\s_-]?(?:school|pet|car|address|street|teacher|friend)\\s+(?:for\\s+)?(?:security|verification|account\\s+(?:recovery|access))"
    # ── PIN / passcode / lock patterns ───────────────────────────────────────
    - "(?i)(?:enter|provide|input)\\s+(?:your\\s+)?(?:pin|passcode|unlock[\\s_-]?code|device[\\s_-]?pin|lock[\\s_-]?code)\\s+(?:to\\s+(?:authenticate|unlock|verify|access|continue))"
    # ── Biometric claims (suspicious for any MCP server tool) ─────────────────
    - "(?i)(?:fingerprint|face[\\s_-]?(?:scan|recognition|id)|retinal?[\\s_-]?scan|biometric|touch[\\s_-]?id|face[\\s_-]?id)\\s+(?:required|needed|to\\s+(?:verify|authenticate|access|unlock))"

    # Legitimate tools that handle credentials securely
    - "(?i)(?:password[\\s_-]?manager|credential[\\s_-]?vault|secret[\\s_-]?store|keychain|keepass|1password|bitwarden)"
    # OAuth and federated identity flows (these don't collect raw credentials)
    - "(?i)(?:oauth|openid|saml|sso|federated|oidc)[\\s_-]?(?:flow|login|auth|connect)"
    # Security testing tools that detect credential harvesting
    - "(?i)(?:detect|prevent|block|scan|test)[\\s_-](?:credential|phishing|harvesting|social[\\s_-]engineering)"
    # MFA management tools (legitimate use of MFA-related terminology)
    - "(?i)(?:manage|configure|set\\s+up|enroll|register)[\\s_-](?:2fa|mfa|authenticator|totp)"

remediation: |
  MCP servers MUST NOT use the elicitation capability to request:
  - Passwords, API keys, tokens, or any authentication secrets
  - MFA/OTP/2FA codes (a real-time relay attack vector)
  - Credit card numbers, CVV, banking details
  - Government IDs (SSN, passport, driver's license)
  - Security question answers or recovery codes
  - Biometric data claims

  The elicitation capability is for structured data necessary for tool function
  (e.g., "which folder to scan?", "which language to use?") — not credential collection.

  For authentication, implement OAuth 2.1 flows with proper authorization server
  registration. Never accept raw credentials through the tool invocation path.

  Reference: MCP Specification 2025-06-18 §Elicitation | OWASP ASI03

test_cases:
  true_positive:
    - { description: "Tool description says 'enter your password to authenticate with the service'", expected: true }
    - { description: "Tool description asks user to 'provide your API key for access to premium features'", expected: true }
    - { description: "Tool description requests '6-digit 2FA code from your authenticator app'", expected: true }
    - { description: "Tool description asks for 'credit card number and CVV to process payment'", expected: true }
    - { description: "Tool description requests 'social security number required to verify identity'", expected: true }
    - { description: "Tool description asks for 'mother's maiden name for security verification'", expected: true }
    - { description: "Tool description requests 'backup recovery code from your 2FA setup'", expected: true }
    - { description: "Tool description asks to 'enter PIN to unlock account access'", expected: true }
  true_negative:
    - { description: "Tool description says 'uses OAuth 2.1 for authentication — no credentials needed'", expected: false }
    - { description: "Password manager tool: 'stores and retrieves credentials from encrypted vault'", expected: false }
    - { description: "Tool description says 'configure your 2FA settings for the account — uses TOTP standard'", expected: false }
    - { description: "Security tool: 'detects credential harvesting patterns in MCP tool descriptions'", expected: false }
enabled: true
