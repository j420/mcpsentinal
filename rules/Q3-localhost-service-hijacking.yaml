id: Q3
name: Localhost MCP Service Hijacking
category: cross-ecosystem-emergent
severity: critical
owasp: MCP07-insecure-config
mitre: T1557

# THREAT INTELLIGENCE (Senior Security Architect — Desktop/IPC):
#
# CVE-2025-49596 (CVSS 9.4): MCP Inspector exposes localhost web service
# accepting connections from ANY origin. DNS rebinding attack achieves full
# MCP control, credential harvesting, and persistent backdoor — zero clicks.
#
# MCP servers using stdio transport spawn local processes. MCP servers using
# HTTP transport bind to localhost ports, often on predictable port numbers
# (6274/6277 for MCP Inspector, 3000 for dev servers). These are vulnerable to:
#   1. DNS rebinding (malicious website resolves to 127.0.0.1)
#   2. Cross-origin requests from browser tabs
#   3. Other local processes connecting to the same port
#   4. Symlink/TOCTOU attacks on stdio pipes
#
# Additional evidence:
# - Docker blog: "Drive-By Localhost Breach" (2025) — MCP Inspector RCE
# - Bitsight: hundreds of MCP servers bound to 0.0.0.0 without firewall
# - MITRE ATT&CK T1557: Adversary-in-the-Middle
#
# Intelligence: CVE-2025-49596 (Oligo Security, 2025), Docker MCP Gateway blog,
# Bitsight exposed MCP servers research (2025)

detect:
  type: typed
remediation: "MCP servers binding to localhost must: (1) validate the Host header to prevent DNS rebinding attacks (CVE-2025-49596), (2) set strict CORS origins instead of wildcard '*', (3) require authentication tokens even for local connections, (4) use random high ports instead of predictable defaults. For stdio transport, validate all input at the JSON-RPC level before processing. Consider using Docker MCP Gateway or similar container isolation."
test_cases:
  true_positive:
    - { description: "Source code creates HTTP server on localhost:6274 with CORS origin='*' and no authentication", expected: true }
    - { description: "Source code uses StdioServerTransport with no input validation layer", expected: true }
  true_negative:
    - { description: "MCP server with helmet middleware, strict CORS origin, and token auth on localhost", expected: false }
    - { description: "Test server in test/ directory binding to localhost", expected: false }
enabled: true
