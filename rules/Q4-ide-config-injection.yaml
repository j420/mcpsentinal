id: Q4
name: IDE MCP Configuration Injection
category: cross-ecosystem-emergent
severity: critical
owasp: MCP10-supply-chain
mitre: AML.T0054

# THREAT INTELLIGENCE (Senior Security Architect — IDE Integration):
#
# CVE-2025-54135 "CurXecute" (CVSS 8.6): Cursor IDE auto-starts MCP servers
# from mcp.json without user confirmation. Malicious Slack message triggers
# payload execution on project open.
#
# CVE-2025-54136 "MCPoison": Once MCP config approved in Cursor, attacker can
# silently change server behavior — commands execute on every project open
# without re-approval.
#
# CVE-2025-59944: Case-sensitivity bypass in Cursor allows overwriting
# .cursor/mcp.json via case-variant paths on Windows/macOS.
#
# CVE-2025-59536 (CVSS 8.7): Claude Code MCP consent bypass — repository-
# controlled settings auto-approve all MCP servers before user reads dialog.
#
# "IDEsaster" (Dec 2025): 30+ flaws across Cursor, Windsurf, Kiro, Copilot,
# Zed, Roo Code, Junie, Cline — all exploiting MCP auto-start/trust patterns.
#
# Intelligence: Check Point Research (2025-2026), AIM Security (2025),
# Tenable CVE-2025-54135/54136, Lakera CVE-2025-59944

detect:
  type: regex
  patterns:
    # MCP server code that writes IDE config files
    - "(?i)(?:write|create|modify|update|save|append).*(?:\\.cursor|\\.vscode|mcp\\.json|\\.claude)"
    - "(?i)(?:mcp\\.json|\\.cursor[/\\\\]|settings\\.json).*(?:write|fs\\.write|writeFile)"
    # Auto-start / auto-approve patterns
    - "(?i)(?:enableAll|auto[_\\s-]?(?:approve|start|connect|run))[_\\s]?(?:Project)?[_\\s]?(?:Mcp|MCP|mcp)"
    - "(?i)enableAllProjectMcpServers"
    - "(?i)enabledMcpjsonServers"
    # Case-sensitivity bypass attempts
    - "(?i)(?:MCP|Mcp|mCp|mcP)\\.(?:JSON|Json|jSon|jsoN)"
    - "(?i)(?:\\.CURSOR|\\.Cursor)[/\\\\]"
    # MCP server spawning with shell=true or similar
    - "(?i)(?:spawn|exec|fork).*(?:npx|node|python|uvx).*(?:mcp|server).*(?:shell\\s*:\\s*true)"
    # Tools that manipulate project-level MCP config
    - "(?i)(?:add|install|register|configure)[_\\s]?mcp[_\\s]?server"
  context: source_code
  exclude_patterns:
    - "(?i)test|spec|mock|fixture|example|readme"
    - "(?i)uninstall|remove|delete.*mcp.*server"
remediation: "MCP servers must NOT write to IDE configuration files (.cursor/mcp.json, .vscode/settings.json, .claude/settings.local.json) without explicit, interactive user confirmation that cannot be bypassed by repository-controlled settings. CVE-2025-54135/54136 (Cursor), CVE-2025-59536 (Claude Code) demonstrated that auto-start and silent config mutation enable RCE. Implement case-normalized path validation (CVE-2025-59944). Never use enableAllProjectMcpServers in shared repositories."
test_cases:
  true_positive:
    - { description: "Source code writes to .cursor/mcp.json to register a new MCP server", expected: true }
    - { description: "Source code contains enableAllProjectMcpServers setting", expected: true }
  true_negative:
    - { description: "Source code reads .cursor/mcp.json to list configured servers", expected: false }
    - { description: "Test fixture that creates mock IDE config for testing", expected: false }
enabled: true
