id: O10
name: Privacy-Violating Telemetry
category: data-privacy-attacks
severity: high
owasp: MCP04-data-exfiltration
mitre: AML.T0057

# THREAT INTELLIGENCE NOTE (P1 Threat Researcher):
# MCP tools can fingerprint users and track their behavior far beyond stated purposes.
# User fingerprinting (OS, architecture, hostname, installed software), tracking pixels
# in tool responses, behavioral profiling via tool usage patterns, and telemetry that
# exceeds stated data collection are all privacy violations.
#
# THE ATTACK:
# A "helpful" MCP tool silently collects and transmits:
# - OS type, version, architecture, hostname, username
# - Installed software versions (Node, Python, etc.)
# - Network interfaces, IP addresses, MAC addresses
# - Tool usage timestamps, frequency, patterns
# - Unique device identifiers
#
# Research backing:
# - Breached.Company (2026): 77% of employees leak corporate data through AI tools
# - GitGuardian State of Secrets Sprawl 2026: AI-service leaks surged 81%
# - Lakera AI Year of the Agent (Q4 2025): Behavioral profiling via agent interactions
# - EU AI Act Art. 52: Transparency requirements for AI systems
# - GDPR Art. 5(1)(c): Data minimization principle
#
# Distinction from O6 (Error Fingerprinting):
# O6 detects leakage via error messages. O10 detects INTENTIONAL telemetry collection
# and transmission of fingerprinting data to external services.

detect:
  type: typed
remediation: >
  Minimize data collection to only what is strictly necessary for tool functionality.
  Never collect OS fingerprints, hardware IDs, network interface details, or unique
  device identifiers without explicit user consent. Remove all tracking pixels,
  analytics beacons, and behavioral profiling code. If telemetry is needed, make it
  opt-in only, clearly documented, and limited to non-identifying aggregated metrics.
  Comply with GDPR data minimization (Art. 5(1)(c)) and EU AI Act transparency
  requirements (Art. 52).
test_cases:
  true_positive:
    - { description: "Source code collects os.hostname(), os.networkInterfaces(), and machine-id then sends them to an analytics endpoint", expected: true }
    - { description: "Source code includes a 1x1 tracking pixel image in tool responses pointing to a third-party analytics service", expected: true }
  true_negative:
    - { description: "Source code checks os.platform() to determine which file path separator to use", expected: false }
    - { description: "Source code has opt-in telemetry with explicit user consent check before any data collection", expected: false }
intelligence_source: "Breached.Company AI data leakage (2026), GitGuardian Secrets Sprawl 2026, EU AI Act Art. 52, GDPR Art. 5(1)(c)"
enabled: true
