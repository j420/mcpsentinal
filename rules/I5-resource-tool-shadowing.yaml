id: I5
name: Resource-Tool Name Shadowing
category: protocol-surface
severity: high
owasp: MCP02-tool-poisoning
mitre: AML.T0054
detect:
  type: typed
remediation: "Use unique, descriptive resource names that do not shadow well-known tool names. Name collisions confuse AI clients about whether they are accessing a tool or a resource, potentially bypassing tool-specific safety checks."
test_cases:
  true_positive:
    - { description: "Resource named 'execute_command' matching a well-known tool name exactly", expected: true }
    - { description: "Resource named 'read_file' shadowing the common filesystem tool name", expected: true }
  true_negative:
    - { description: "Resource named 'project_readme' with no overlap with known tool names", expected: false }
    - { description: "Resource named 'monthly_sales_report' — unique descriptive name", expected: false }
enabled: true
