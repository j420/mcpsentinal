# MCP Sentinel — per-rule accuracy targets (Layer 5 regression gate)
#
# Each active rule declares a minimum precision, minimum recall, and a rationale.
# The accuracy-dashboard CI gate compares measured metrics against these targets;
# a rule measured below its target (or regressing from the prior snapshot) fails the
# Rule Accuracy Audit workflow.
#
# Tuning guidance:
#   - Critical-severity rules         target_precision >= 0.90
#   - Structural / AST / dependency   target_precision >= 0.90, target_recall >= 0.75
#   - Linguistic / behavioural        target_precision >= 0.80, target_recall >= 0.60
#   - Companion stub rules            target_precision = 1.0, target_recall = null (N/A)
#
# Targets are BASELINES. Tighten as rules mature, never loosen without an ADR amendment.
# Where the rationale notes "target pinned to measured floor", the rule is maturing and
# the target is deliberately set at the current measurement to establish a ratchet.
#
# Retired rules (O1-O3, O7, Q1, Q2, Q5, Q8, Q9, Q11, Q12, Q14, M3) are excluded:
# their YAMLs have enabled: false and they have no implementation in the engine.

