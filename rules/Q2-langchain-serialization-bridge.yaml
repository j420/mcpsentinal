id: Q2
name: LangChain Serialization Bridge Injection
category: cross-ecosystem-emergent
severity: critical
owasp: MCP03-command-injection
mitre: AML.T0054

# THREAT INTELLIGENCE (Senior Security Architect — Cross-Ecosystem):
#
# CVE-2025-68664 (CVSS 9.3) "LangGrinch": LangChain's dumps()/dumpd() do not
# escape dictionaries with `lc` keys. MCP tool outputs flowing into LangChain
# pipelines can contain attacker-controlled `lc` markers, causing arbitrary
# object instantiation during deserialization.
#
# CVE-2025-68665 (CVSS 8.6): Same vulnerability in LangChain.js affecting
# @langchain/core and langchain packages.
#
# ATTACK MODEL:
#   1. MCP tool returns JSON response containing `{"lc": 1, "id": ["langchain_core", ...]}`
#   2. LangChain agent serializes this response (streaming, memory, checkpointing)
#   3. Deserialization instantiates arbitrary LangChain objects
#   4. Secret extraction via secrets_from_env, or RCE via Jinja2 templates
#
# This is NOT a LangChain-only problem — it's a cross-ecosystem attack where
# MCP tool output is the injection vector into the LangChain serialization layer.
#
# Intelligence: CVE-2025-68664 (Cyata/Yarden Porat, Dec 2025), CVE-2025-68665

detect:
  type: typed
    # MCP server code that constructs responses with LangChain serialization markers
    - "(?i)[\"']lc[\"']\\s*:\\s*[12]"
    - "(?i)[\"']type[\"']\\s*:\\s*[\"'](?:constructor|secret|not_implemented)[\"']"
    - "(?i)[\"']id[\"']\\s*:\\s*\\[\\s*[\"']langchain"
    # MCP-to-LangChain bridge code patterns
    - "(?i)(?:from|import)\\s+langchain.*(?:dumps|dumpd|loads|load)"
    - "(?i)langchain.*(?:serialize|deserialize|dumps|loads).*(?:mcp|tool[_\\s]?(?:output|result|response))"
    - "(?i)(?:mcp|tool).*(?:output|result|response).*langchain.*(?:serialize|dumps|dumpd)"
    # LangChain tool wrapper around MCP
    - "(?i)class\\s+\\w*MCP\\w*\\(.*(?:BaseTool|StructuredTool|Tool)\\)"
    - "(?i)MCPToolkit.*(?:get_tools|as_tools|convert)"
    # Vulnerable deserialization with secrets enabled
    - "(?i)secrets_from_env\\s*=\\s*True"
    - "(?i)load\\(.*(?:allow_dangerous|secrets)"
remediation: "MCP tool outputs flowing into LangChain serialization pipelines must be sanitized to strip `lc` marker keys before serialization. Update LangChain to >=0.3.81 or >=1.2.5 which patches CVE-2025-68664. Never use secrets_from_env=True in production. Implement an allowlist via `allowed_objects` parameter on load()/loads(). Treat all MCP tool responses as untrusted data in LangChain deserialization contexts."
test_cases:
  true_positive:
    - { description: "Source code wraps MCP tools in LangChain BaseTool subclass and serializes outputs via dumps()", expected: true }
    - { description: "Source code constructs response objects with 'lc' key markers for LangChain compatibility", expected: true }
  true_negative:
    - { description: "Pure MCP server with no LangChain imports or serialization", expected: false }
    - { description: "LangChain test file verifying serialization safety", expected: false }
enabled: true
