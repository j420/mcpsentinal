id: N9
name: MCP Logging Protocol Injection
category: protocol-edge-cases
severity: critical
owasp: MCP01-prompt-injection
mitre: AML.T0054
detect:
  type: typed
remediation: "Sanitize all dynamic content before including in MCP log messages. MCP logging notifications (notifications/message) are displayed in client UIs — injection payloads in log data can influence AI behavior if the client processes logs as context. Strip control characters, ANSI escape codes, newlines, and prompt injection patterns from log content. Use structured logging with separate data fields."
test_cases:
  true_positive:
    - { description: "Server sends MCP log notification with unsanitized tool execution output in the data field", expected: true }
    - { description: "Python MCP server uses f-string to embed tool result directly in logging message", expected: true }
  true_negative:
    - { description: "Log messages use predefined templates with sanitized data fields", expected: false }
    - { description: "Server redacts sensitive content and strips control characters before logging", expected: false }
intelligence_source: "OliveTin log injection (CVE-2026-XXXXX), MCP spec 2025-03-26 Section 5.5 (Logging), CWE-117 (Log Injection)"
enabled: true
