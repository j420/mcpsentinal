id: C5
name: Hardcoded Secrets in Source Code
category: code-analysis
severity: critical
owasp: MCP07-insecure-config
mitre: null
detect:
  type: regex
  patterns:
    # Generic key=value secret assignments
    - "(?i)(?:api_key|apikey|api_secret|secret_key|access_token|auth_token|private_key|client_secret)\\s*[=:]\\s*['\"][A-Za-z0-9+/=_\\-]{20,}['\"]"
    - "(?i)(?:password|passwd|pwd)\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
    # OpenAI — classic and project key formats
    - "sk-[a-zA-Z0-9]{20,}"
    - "sk-proj-[a-zA-Z0-9\\-_]{20,}"
    # Anthropic
    - "sk-ant-[a-zA-Z0-9\\-_]{20,}"
    # GitHub tokens
    - "ghp_[a-zA-Z0-9]{36}"
    - "gho_[a-zA-Z0-9]{36}"
    - "ghs_[a-zA-Z0-9]{36}"
    - "github_pat_[a-zA-Z0-9_]{82}"
    # AWS
    - "AKIA[0-9A-Z]{16}"
    - "ASIA[0-9A-Z]{16}"
    - "(?i)aws_secret_access_key\\s*[=:]\\s*['\"][A-Za-z0-9+/]{40}['\"]"
    # Slack
    - "xoxb-[0-9A-Za-z\\-]{50,}"
    - "xoxp-[0-9A-Za-z\\-]{50,}"
    - "xoxs-[0-9A-Za-z\\-]{50,}"
    - "xoxa-[0-9A-Za-z\\-]{50,}"
    # Stripe
    - "sk_live_[a-zA-Z0-9]{24,}"
    - "rk_live_[a-zA-Z0-9]{24,}"
    - "pk_live_[a-zA-Z0-9]{24,}"
    # Twilio
    - "AC[a-z0-9]{32}"
    - "SK[a-z0-9]{32}"
    # SendGrid
    - "SG\\.[a-zA-Z0-9\\-_]{22,}\\.[a-zA-Z0-9\\-_]{43,}"
    # JWT (non-env)
    - "eyJ[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}"
    # SSH / PEM private keys
    - "-----BEGIN\\s+(?:RSA|EC|DSA|OPENSSH|PRIVATE)\\s+PRIVATE\\s+KEY"
    # Generic bearer token hardcoded
    - "(?i)bearer\\s+[a-zA-Z0-9._\\-]{20,}"
    # Discord bot token
    - "[MN][A-Za-z\\d]{23}\\.[\\w-]{6}\\.[\\w-]{27}"
    # Google API key
    - "AIza[0-9A-Za-z\\-_]{35}"
    # Telegram bot token
    - "[0-9]{8,10}:[a-zA-Z0-9_\\-]{35}"
    # NPM token
    - "npm_[a-zA-Z0-9]{36}"
    # Databricks
    - "dapi[a-h0-9]{32}"
    # HuggingFace — widely used for AI model access in MCP servers
    - "hf_[a-zA-Z0-9]{34,}"
    # Replicate — AI inference platform
    - "r8_[a-zA-Z0-9]{36,}"
    # Mistral AI
    - "(?i)(?:mistral[_\\s-]?(?:api[_\\s-]?)?key|MISTRAL_API_KEY)\\s*[=:]\\s*['\"][a-zA-Z0-9]{32,}['\"]"
    # Cohere
    - "(?i)(?:cohere[_\\s-]?(?:api[_\\s-]?)?key|CO_API_KEY)\\s*[=:]\\s*['\"][a-zA-Z0-9\\-_]{32,}['\"]"
    # Azure OpenAI / Azure Cognitive Services subscription key
    - "(?i)(?:azure[_\\s-]?(?:openai[_\\s-]?)?(?:api[_\\s-]?)?key|AZURE_OPENAI_API_KEY|OCP_APIM_SUBSCRIPTION_KEY)\\s*[=:]\\s*['\"][a-f0-9]{32}['\"]"
    # Pinecone (vector DB common in AI MCP servers)
    - "(?i)(?:pinecone[_\\s-]?(?:api[_\\s-]?)?key|PINECONE_API_KEY)\\s*[=:]\\s*['\"][a-zA-Z0-9\\-_]{36,}['\"]"
    # Groq
    - "gsk_[a-zA-Z0-9]{52}"
    # Together AI
    - "(?i)(?:together[_\\s-]?(?:api[_\\s-]?)?key|TOGETHER_API_KEY)\\s*[=:]\\s*['\"][a-f0-9]{64}['\"]"
    # Anthropic Claude.ai session keys (client-side)
    - "sk-ant-sid[a-zA-Z0-9\\-_]{40,}"
  context: source_code
  exclude_patterns:
    - "process\\.env"
    - "os\\.environ"
    - "os\\.getenv"
    - "getenv"
    - "placeholder"
    - "example"
    - "xxx+"
    - "your_"
    - "<YOUR_"
    - "\\$\\{"
    - "config\\."
    - "settings\\."
    - "\\.env"
remediation: "Move all secrets to environment variables. Use a secrets manager (Vault, AWS Secrets Manager, Doppler) in production. Rotate any exposed credentials immediately. Add a pre-commit hook (e.g. gitleaks, truffleHog) to prevent future leaks."
test_cases:
  true_positive:
    - { description: "Source code contains api_key = 'sk-ant-api03-abcdef1234567890abcdef1234567890' hardcoded Anthropic key", expected: true }
    - { description: "Source code contains AKIA1234567890ABCDEF hardcoded AWS access key ID", expected: true }
  true_negative:
    - { description: "Source code reads API key from environment: const key = process.env.API_KEY", expected: false }
    - { description: "Source code contains placeholder api_key = 'your_api_key_here' in example config", expected: false }
enabled: true
