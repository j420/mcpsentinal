id: C5
name: Hardcoded Secrets in Source Code
category: code-analysis
severity: critical
owasp: MCP07-insecure-config
mitre: null
detect:
  type: regex
  patterns:
    - "(?i)(?:api_key|apikey|api_secret|secret_key|access_token|auth_token|private_key)\\s*[=:]\\s*['\"][A-Za-z0-9+/=_-]{20,}['\"]"
    - "(?i)(?:password|passwd|pwd)\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
    - "sk-[a-zA-Z0-9]{20,}"
    - "ghp_[a-zA-Z0-9]{36}"
    - "AKIA[0-9A-Z]{16}"
    - "(?i)bearer\\s+[a-zA-Z0-9._-]{20,}"
  context: source_code
  exclude_patterns:
    - "process.env"
    - "os.environ"
    - "os.getenv"
    - "placeholder"
    - "example"
    - "xxx"
    - "your_"
    - "<YOUR_"
remediation: "Move all secrets to environment variables. Use .env files locally and a secrets manager in production. Never commit secrets to source control."
enabled: true
