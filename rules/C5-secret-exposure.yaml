id: C5
name: Hardcoded Secrets in Source Code
category: code-analysis
severity: critical
owasp: MCP07-insecure-config
mitre: null
detect:
  type: typed
remediation: "Move all secrets to environment variables. Use a secrets manager (Vault, AWS Secrets Manager, Doppler) in production. Rotate any exposed credentials immediately. Add a pre-commit hook (e.g. gitleaks, truffleHog) to prevent future leaks."
test_cases:
  true_positive:
    - { description: "Source code contains api_key = 'sk-ant-api03-abcdef1234567890abcdef1234567890' hardcoded Anthropic key", expected: true }
    - { description: "Source code contains AKIA1234567890ABCDEF hardcoded AWS access key ID", expected: true }
  true_negative:
    - { description: "Source code reads API key from environment: const key = process.env.API_KEY", expected: false }
    - { description: "Source code contains placeholder api_key = 'your_api_key_here' in example config", expected: false }
enabled: true
