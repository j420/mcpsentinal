id: O7
name: Cross-Session Data Leakage
category: data-privacy-attacks
severity: critical
owasp: MCP04-data-exfiltration
mitre: AML.T0057

# THREAT INTELLIGENCE NOTE (P1 Threat Researcher):
# MCP servers that maintain state between sessions can leak data across users or sessions.
# When context, cache, or memory state bleeds between sessions, authentication becomes
# irrelevant — data reaches users who were never granted access.
#
# THE ATTACK:
# 1. MCP server uses module-level/global variables to cache user data
# 2. User A's query populates the cache with sensitive results
# 3. User B connects to the same server instance and receives User A's cached data
# 4. OR: Server stores data in shared files/databases without session isolation
#
# Research backing:
# - Giskard AI (2025): "Cross Session Leak" — when context, cache, or memory state
#   bleeds between user sessions, authentication controls become irrelevant
# - OWASP LLM02:2025: Sensitive Information Disclosure via shared state
# - Palo Alto Unit 42 (2026): "Agent Session Smuggling" — stateful attacks leveraging
#   persistent session state in multi-agent systems
# - Lakera AI (2026): Memory injection attacks causing persistent false beliefs
#   across sessions — "poisoned memory persists, the agent recalls it in future sessions"
# - Galileo AI (Dec 2026): Cascading failures via shared agent state
#
# This detects code patterns that create shared mutable state between sessions:
# module-level caches, global variables storing user data, shared files without
# session-scoped paths, and unscoped in-memory stores.

detect:
  type: typed
remediation: >
  Never use module-level or global variables to cache user data. All data stores must be
  scoped to the current session or user. Use session-keyed storage (Map keyed by session ID)
  or per-user database tables. Implement cache isolation between sessions.
  Clear all user data when a session ends. Never share mutable state between
  concurrent connections. Use Redis or similar session stores with proper TTL and isolation.
test_cases:
  true_positive:
    - { description: "Source code uses a module-level 'const cache = new Map()' that stores tool results without session scoping", expected: true }
    - { description: "Source code writes to /tmp/cache/results.json shared across all user sessions", expected: true }
  true_negative:
    - { description: "Source code uses a session-scoped Map keyed by req.sessionId for per-user caching", expected: false }
    - { description: "Source code uses Redis with user-specific key prefix for session isolation", expected: false }
intelligence_source: "Giskard Cross-Session Leak (2025), OWASP LLM02:2025, Palo Alto Unit42 Agent Session Smuggling (2026), Lakera Memory Injection (2026)"
enabled: false
retirement_rationale: >
  Retired 2026-04-07. Detection matched module-level mutable state (global/shared +
  session/cache/state) without per-session isolation keywords. Module-level caches,
  singletons, and shared state are standard Node.js patterns (connection pools, config
  caches, rate limiters). Estimated false-positive rate >50%. The negative-lookahead for
  isolation keywords is fragile — legitimate isolation uses different naming conventions
  than the checked keywords. Actual cross-session data leakage requires runtime analysis
  showing that sensitive user data persists between requests, which is beyond static
  analysis scope.
