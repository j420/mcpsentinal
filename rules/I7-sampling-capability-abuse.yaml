id: I7
name: Sampling Capability Abuse
category: protocol-surface
severity: critical
owasp: MCP01-prompt-injection
mitre: AML.T0054
detect:
  type: typed
remediation: "Servers declaring sampling capability can request the client LLM to generate arbitrary text, amplifying attack success by 23-41% (Breaking the Protocol, arXiv 2601.17549). Combined with external content ingestion, this creates a weaponized inference loop. Remove sampling capability or implement strict content sanitization on all ingested external content."
test_cases:
  true_positive:
    - { description: "Server declaring sampling capability with a tool named 'scrape_webpage' that ingests external content", expected: true }
    - { description: "Server declaring sampling capability with a tool named 'read_email_inbox' that processes untrusted messages", expected: true }
  true_negative:
    - { description: "Server declaring sampling capability with only a 'calculate_sum' tool and no external content ingestion", expected: false }
    - { description: "Server without sampling capability that has a 'fetch_url' tool — no sampling to abuse", expected: false }
enabled: true
