id: N4
name: JSON-RPC Error Object Injection
category: protocol-edge-cases
severity: critical
owasp: MCP01-prompt-injection
mitre: AML.T0054
detect:
  type: typed
remediation: "Never include unsanitized external input in JSON-RPC error message or data fields. Error messages are processed by AI clients as context — a malicious server can embed prompt injection payloads in error responses that the LLM treats as instructions. Use predefined error messages with error codes. Sanitize any dynamic content in error.data."
test_cases:
  true_positive:
    - { description: "Server constructs JSON-RPC error with message from request parameter: {code: -32600, message: req.body.input}", expected: true }
    - { description: "Error data field set directly from tool execution result without sanitization", expected: true }
  true_negative:
    - { description: "Server returns predefined error messages: {code: -32601, message: 'Method not found'}", expected: false }
    - { description: "Error message is sanitized before inclusion: {message: sanitize(input)}", expected: false }
intelligence_source: "CyberArk ATPA research (2025) — tool output poisoning patterns, arXiv 2601.17549 — error response as injection vector"
enabled: true
