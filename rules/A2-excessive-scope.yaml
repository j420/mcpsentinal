id: A2
name: Excessive Scope Claims in Description
category: description-analysis
severity: high
owasp: MCP06-excessive-permissions
mitre: null
detect:
  type: regex
  patterns:
    - "(?i)access\\s+(any|all|every)\\s+(file|database|system|resource)"
    - "(?i)full\\s+(database|filesystem|system|admin)\\s+access"
    - "(?i)unrestricted\\s+access"
    - "(?i)root\\s+access"
    - "(?i)sudo\\s+privileges"
    - "(?i)can\\s+modify\\s+any"
    - "(?i)arbitrary\\s+(file|code|command)\\s+execution"
  context: tool_description
  exclude_patterns: []
remediation: "Limit scope claims to specific directories, databases, or resources. Follow the principle of least privilege in tool descriptions."
test_cases:
  true_positive:
    - { description: "Tool description claims 'full database access to all tables and schemas'", expected: true }
    - { description: "Tool description claims 'unrestricted access to the filesystem'", expected: true }
  true_negative:
    - { description: "Tool description says 'Reads files from the /tmp directory'", expected: false }
    - { description: "Tool description says 'Queries the users table by ID'", expected: false }
enabled: true
