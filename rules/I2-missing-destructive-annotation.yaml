id: I2
name: Missing Destructive Tool Annotation
category: protocol-surface
severity: high
owasp: MCP06-excessive-permissions
mitre: AML.T0054
detect:
  type: typed
remediation: "Add destructiveHint=true annotation to tools that modify state, execute commands, or send data. Clients use annotations to determine confirmation requirements — missing annotations default to unsafe auto-approval behavior."
test_cases:
  true_positive:
    - { description: "Tool named 'execute_shell' with no annotations object defined at all", expected: true }
    - { description: "Tool named 'delete_user' with annotations present but destructiveHint not set", expected: true }
  true_negative:
    - { description: "Tool named 'delete_record' with annotations.destructiveHint=true", expected: false }
    - { description: "Tool named 'get_status' with no annotations — name contains no destructive signals", expected: false }
enabled: true
