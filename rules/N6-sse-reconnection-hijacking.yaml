id: N6
name: SSE Reconnection Hijacking
category: protocol-edge-cases
severity: critical
owasp: MCP07-insecure-config
mitre: AML.T0061
detect:
  type: regex
  patterns:
    # SSE Last-Event-ID accepted without validation
    - "(?i)(last-event-id|lastEventId|last_event_id)\\s*[:=]\\s*(?:req\\.|headers\\.|request\\.)"
    # EventSource reconnection without re-authentication
    - "(?i)(?:EventSource|evtSource|eventSource|sse)\\s*(?:=\\s*new\\s+EventSource|\\.(onopen|addEventListener\\s*\\(\\s*['\"]open))(?!.*(?:auth|token|credential|withCredentials))"
    # SSE endpoint that restores state from client-provided ID
    - "(?i)(?:last-event-id|lastEventId).*(?:resume|restore|replay|rewind|seek)"
    # Python SSE reconnection without auth check
    - "(?i)(?:last_event_id|last-event-id)\\s*=\\s*(?:request\\.headers|environ)\\.get"
  context: source_code
  exclude_patterns:
    - "(?i)test|spec|mock|fixture|example"
    - "(?i)(?:verifyAuth|authenticate|validateSession|checkToken)"
remediation: "Always re-authenticate on SSE reconnection. Do not trust the Last-Event-ID header as proof of session identity — an attacker who observes or guesses event IDs can hijack the reconnected stream. Bind SSE streams to authenticated sessions, not event IDs. Use cryptographically random event IDs. Reference: CVE-2025-6515 (session ID prediction in oatpp-mcp)."
test_cases:
  true_positive:
    - { description: "Server reads Last-Event-ID header and resumes event stream without re-authenticating the client", expected: true }
    - { description: "EventSource client reconnects without sending authentication credentials on reconnection", expected: true }
  true_negative:
    - { description: "Server validates session token on every SSE reconnection before resuming the event stream", expected: false }
    - { description: "SSE endpoint requires withCredentials: true and verifies auth cookie on reconnection", expected: false }
intelligence_source: "CVE-2025-6515 (oatpp-mcp session hijacking), JFrog Prompt Hijacking research (2025), MCP spec 2025-03-26 SSE transport deprecation"
enabled: true
