id: I13
name: Cross-Config Lethal Trifecta
category: protocol-surface
severity: critical
owasp: MCP04-data-exfiltration
mitre: AML.T0054
detect:
  type: typed
remediation: "The servers in your MCP configuration collectively form a lethal trifecta — one reads private data, another ingests untrusted content, and a third sends external communications. While each server individually may be safe, together they enable cross-server data exfiltration. Separate high-risk server combinations into isolated configurations."
test_cases:
  true_positive:
    - { description: "Config has server A reading private files, server B scraping web content, and server C sending emails — trifecta across three servers", expected: true }
    - { description: "Config has a database reader server, a Slack message ingester, and an HTTP webhook sender in the same client config", expected: true }
  true_negative:
    - { description: "Config has only a calculator server and a weather lookup server with no data access or external comms", expected: false }
    - { description: "Config has a single read-only documentation server with no untrusted input or external communication capability", expected: false }
enabled: true
