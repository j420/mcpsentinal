id: C15
name: Timing Attack on Secret or Token Comparison
category: code-analysis
severity: high
owasp: MCP07-insecure-config
mitre: null
detect:
  type: regex
  patterns:
    # Direct string equality on secrets/tokens/passwords (timing-unsafe)
    - "(?i)(?:api_?key|token|secret|password|passwd|credential|auth)\\s*===?\\s*(?:req|input|param|args|body|header|provided|user)"
    - "(?i)(?:req|input|param|args|body|header|provided)\\s*===?\\s*(?:api_?key|token|secret|password|passwd|credential)"
    # Variable named after secret being compared with ==
    - "(?i)(?:key|token|secret|password|passwd|auth|credential)\\s*[!=]=\\s*['\"][A-Za-z0-9+/=_\\-]{8,}['\"]"
    # Python == on hmac/signature values
    - "(?i)(?:hmac|signature|digest|mac)\\s*==\\s*(?:req|input|param|args|expected|provided)"
    - "(?i)(?:req|input|param|args|expected|provided)\\s*==\\s*(?:hmac|signature|digest|mac)"
    # Dangerous: comparing hash outputs with ==
    - "(?i)(?:sha[0-9]+|md5|blake2)\\([^)]+\\)\\s*[!=]=\\s*"
    # Missing timingSafeEqual where it should be used
    - "(?i)verify(?:Token|Key|Secret|Password|Auth|Signature|Hmac)\\s*\\([^)]*\\)\\s*\\{[^}]*[!=]=="
  context: source_code
  exclude_patterns:
    - "crypto.timingSafeEqual"
    - "hmac.compare_digest"
    - "secrets.compare_digest"
    - "constant_time_compare"
    - "timingSafeCompare"
remediation: "Use crypto.timingSafeEqual() (Node.js) or hmac.compare_digest() (Python) for ALL secret/token/password comparisons. Standard string equality (===, ==) is vulnerable to timing attacks that allow attackers to determine correct values bit by bit."
enabled: true
