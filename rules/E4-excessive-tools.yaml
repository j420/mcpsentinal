id: E4
name: Excessive Tool Count
category: behavioral-analysis
severity: medium
owasp: MCP06-excessive-permissions
mitre: null
detect:
  type: typed
remediation: "Reduce the number of tools exposed by the server. Servers with many tools are harder to audit and have a larger attack surface. Consider splitting into focused sub-servers."
test_cases:
  true_positive:
    - { description: "MCP server exposes 75 tools in its tools/list response", expected: true }
    - { description: "MCP server exposes 120 tools covering every possible database operation", expected: true }
  true_negative:
    - { description: "MCP server exposes 10 focused tools for file operations", expected: false }
    - { description: "MCP server exposes 25 tools for a comprehensive GitHub integration", expected: false }
enabled: true
