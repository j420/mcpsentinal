id: E4
name: Excessive Tool Count
category: behavioral-analysis
severity: medium
owasp: MCP06-excessive-permissions
mitre: null
detect:
  type: schema-check
  conditions:
    check: tool_count_exceeds
    threshold: 50
  context: metadata
remediation: "Reduce the number of tools exposed by the server. Servers with many tools are harder to audit and have a larger attack surface. Consider splitting into focused sub-servers."
enabled: true
