id: L9
name: CI/CD Secret Exfiltration Patterns
category: supply-chain-advanced
severity: critical
owasp: MCP07-insecure-config
mitre: AML.T0057

# THREAT INTELLIGENCE (P1 Researcher — Supply Chain):
# Source: CVE-2025-30066 (tj-actions secret exfiltration via workflow logs),
#         Shai-Hulud worm (Sept 2025 — exfiltrated npm tokens via GitHub repos),
#         Unit42 "GitHub Actions Supply Chain Attack" (March 2025),
#         Datadog DevSecOps 2026 Report
#
# THE ATTACK: MCP server build pipelines handle sensitive secrets: npm publish
# tokens, database URLs, API keys, signing credentials. Attackers inject code
# that exfiltrates these secrets during CI/CD execution:
#   1. Printing secrets to stdout/stderr (captured in CI logs)
#   2. Encoding secrets in DNS queries (bypasses network monitoring)
#   3. Writing secrets to public GitHub repos (Shai-Hulud technique)
#   4. Sending secrets via HTTP to attacker infrastructure
#   5. Embedding secrets in build artifacts that get published
#
# CVE-2025-30066: tj-actions/changed-files exfiltrated AWS keys, GitHub PATs,
# npm tokens, and RSA keys by printing them to workflow logs.
#
# DIFFERENCE FROM C5 (hardcoded secrets): C5 detects secrets IN source code.
# L9 detects code patterns that EXFILTRATE secrets from the CI environment.

detect:
  type: regex
  patterns:
    # Printing environment variables containing secrets to stdout
    - "(?i)(?:console\\.log|print|echo|puts).*(?:process\\.env|os\\.environ|\\$\\{?(?:NPM_TOKEN|NODE_AUTH_TOKEN|GITHUB_TOKEN|AWS_ACCESS|DATABASE_URL|ANTHROPIC_API_KEY))"
    # Base64 encoding secrets for exfiltration
    - "(?i)(?:btoa|Buffer\\.from|base64\\.b64encode).*(?:process\\.env|os\\.environ|TOKEN|SECRET|KEY|PASSWORD)"
    # HTTP exfiltration of environment variables
    - "(?i)(?:fetch|axios|request|http\\.post|urllib|requests\\.post).*(?:process\\.env|os\\.environ|env\\[)"
    # Writing secrets to files that might be uploaded as artifacts
    - "(?i)(?:writeFileSync|writeFile|open.*w).*(?:process\\.env|os\\.environ).*(?:TOKEN|SECRET|KEY|CREDENTIAL|PASSWORD)"
    # DNS exfiltration of secrets (encoding in subdomain)
    - "(?i)(?:dns\\.resolve|lookup|nslookup|dig).*(?:process\\.env|TOKEN|SECRET|KEY)"
    # Git operations that could leak secrets (Shai-Hulud technique)
    - "(?i)(?:git\\s+push|git\\s+commit).*(?:process\\.env|os\\.environ|TOKEN|SECRET|base64)"
    # Webhook exfiltration
    - "(?i)(?:webhook|callback|notify).*(?:url|endpoint).*(?:process\\.env|os\\.environ|secrets)"
    # Environment dump patterns
    - "(?i)(?:Object\\.keys|JSON\\.stringify|vars|dict)\\s*\\(\\s*(?:process\\.env|os\\.environ)\\s*\\)"
  context: source_code
  exclude_patterns:
    - "(?i)test|spec|mock|fixture|example"
    - "(?i)(?:mask|redact|sanitize|censor|hide).*(?:secret|token|key|password)"
    - "(?i)::add-mask::"
remediation: "Never print, log, or transmit CI environment variables containing secrets. Use GitHub Actions '::add-mask::' to prevent accidental secret exposure in logs. Audit all third-party Actions for secret access patterns. Use OIDC tokens instead of long-lived secrets where possible. Restrict secret access to specific workflow jobs and steps. Monitor CI logs for base64-encoded strings."
test_cases:
  true_positive:
    - { description: "Build script console.logs process.env.NPM_TOKEN during publish step", expected: true }
    - { description: "Code base64-encodes environment variables and sends them via HTTP POST", expected: true }
    - { description: "Script dumps Object.keys(process.env) to a file for artifact upload", expected: true }
  true_negative:
    - { description: "Code uses ::add-mask:: to hide secrets before logging", expected: false }
    - { description: "Test file mocks process.env for unit testing", expected: false }
enabled: true
