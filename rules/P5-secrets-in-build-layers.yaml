id: P5
name: Secrets Exposed in Container Build Layers
category: infrastructure-runtime
severity: critical
owasp: MCP07-insecure-config
mitre: T1552.001
# Wiz Docker Secrets Guide (2025): Docker ARGs persist in image layers and history.
# CIS Docker Benchmark v1.7.0 §4.10: "Do not store secrets in Dockerfiles"
# Kubernetes Secrets Management 2025 (Infisical): base64 secrets are not encryption.
# Doppler (2026): "Environment variables are plain text, prone to leaks."

detect:
  type: typed
    # Secrets passed as Docker build args
    - "(?i)ARG\\s+(?:SECRET|PASSWORD|TOKEN|API_KEY|PRIVATE_KEY|AWS_SECRET|DB_PASSWORD|DATABASE_URL|CREDENTIALS|CLIENT_SECRET|AUTH_TOKEN|ACCESS_KEY)[\\s=]"
    # Docker ENV with inline secret values (not variable references)
    - "(?i)ENV\\s+(?:SECRET|PASSWORD|TOKEN|API_KEY|PRIVATE_KEY|AWS_SECRET|DB_PASSWORD|CLIENT_SECRET)\\s*[=]\\s*[\"']?[A-Za-z0-9+/=_\\-]{16,}"
    # Copying secret files into image layers
    - "(?i)COPY\\s+.*(?:\\.env|credentials|secret|private[_\\-]?key|\\.pem|\\.p12|\\.pfx|\\.keystore)\\s"
    - "(?i)ADD\\s+.*(?:\\.env|credentials|secret|private[_\\-]?key|\\.pem|\\.p12|\\.pfx|\\.keystore)\\s"
    # Kubernetes ConfigMap with secret-looking keys (should be Secret object)
    - "(?i)kind:\\s*ConfigMap[\\s\\S]{0,200}(?:password|secret|token|api[_\\-]?key|private[_\\-]?key)\\s*:"
    # Terraform plaintext secrets in state
    - "(?i)(?:variable|resource).*(?:password|secret|token).*default\\s*=\\s*[\"'][^\"']{8,}[\"']"
    # docker run with -e passing secret values directly
    - "(?i)docker\\s+run.*-e\\s+(?:PASSWORD|SECRET|TOKEN|API_KEY|AWS_SECRET)\\s*=\\s*[\"']?[A-Za-z0-9+/=]{16,}"
remediation: "Never pass secrets via Dockerfile ARG/ENV or COPY. Use Docker BuildKit secrets (--secret flag) for build-time secrets, which are not persisted in image layers. For runtime secrets, use mounted Kubernetes Secrets (not ConfigMaps), environment variables sourced from Secret objects, or external secrets managers (Vault, AWS Secrets Manager, Doppler). Enable encryption at rest for Kubernetes etcd. Use multi-stage builds to prevent secret leakage in intermediate layers."
test_cases:
  true_positive:
    - { description: "Dockerfile has ARG DB_PASSWORD=mysecretpassword and uses it in ENV", expected: true }
    - { description: "Kubernetes ConfigMap contains database_password: hunter2 instead of using a Secret object", expected: true }
  true_negative:
    - { description: "Dockerfile uses --mount=type=secret for build-time secrets with BuildKit", expected: false }
    - { description: "docker-compose.yml sources secrets from environment variable references ${DB_PASSWORD}", expected: false }
intelligence_source: "Wiz Docker Secrets Guide (2025), CIS Docker Benchmark v1.7.0 Section 4.10, Doppler Environment Variable Security (2026), Infisical Kubernetes Secrets Management (2025)"
enabled: true
