id: I14
name: Rolling Capability Drift
category: protocol-surface
severity: high
owasp: MCP10-supply-chain
mitre: AML.T0054
detect:
  type: behavioral
  conditions:
    check: rolling_capability_drift
    window_scans: 4
    cumulative_threshold: 5
    description: "Detects gradual capability addition over multiple scans that stays below G6's per-scan threshold. An attacker adding 1 dangerous tool per week for 5 weeks evades G6 but is caught here."
  context: metadata
remediation: "Server has gradually added capabilities over multiple scan periods in a pattern consistent with trust-then-exploit attacks. Review all recently added tools. Consider the server's total capability growth rate relative to its initial tool set."
enabled: true
