id: K1
name: Absent Structured Logging
category: compliance-governance
severity: high
owasp: MCP09-logging-monitoring
mitre: AML.T0054

# FRAMEWORK MAPPING (P11 Compliance Mapper):
# - CoSAI MCP-T12: Insufficient Logging/Monitoring
# - MAESTRO L5: Evaluation & Observability — logging gaps
# - NIST AI RMF MEASURE 2.6: Evaluate security of AI system (requires audit evidence)
# - ISO 42001 A.8.1: Transparency (requires observable behavior)
# - ISO 27001 A.8.15: Logging — event logs shall be produced, stored, protected
# - CSA AICM: Governance, Risk & Compliance domain — audit trails
#
# THE GAP: MCP servers that handle tool calls without structured logging
# create blind spots. If a compromised agent makes malicious tool calls,
# there's no audit trail. Security incident response becomes impossible.
#
# WHAT WE DETECT: Source code that handles HTTP requests, tool calls,
# or MCP operations WITHOUT any logging framework imported or used.
# We check for ABSENCE of logging — servers that process requests
# but never import pino, winston, bunyan, log4js, or Python logging.

detect:
  type: typed
# Phase 1, chunk 1.1 — first rule migrated to Rule Standard v2 (see
# docs/standards/rule-standard-v2.md). Findings from this rule contribute
# to the shadow total_score_v2 column alongside the public score.
engine_v2: true
remediation: "Implement structured logging (pino, winston, or equivalent) for all tool call handlers. Every tool invocation should log: timestamp, tool name, caller identity, parameters (sanitized), result status, and duration. Required by ISO 27001 A.8.15, CoSAI MCP-T12, and NIST AI RMF MEASURE 2.6."
test_cases:
  true_positive:
    - { description: "Source code disables logger with logger.silent = true before handling tool calls", expected: true }
    - { description: "Source code uses only console.log for tool request handling with no structured logger", expected: true }
    - { description: "Python source sets logging.disable(logging.CRITICAL) suppressing all log output", expected: true }
  true_negative:
    - { description: "Source code imports pino and logs every tool invocation with structured fields", expected: false }
    - { description: "Test file uses console.log for debugging test assertions", expected: false }
enabled: true
