id: D4
name: Excessive Dependency Count
category: dependency-analysis
severity: low
owasp: MCP08-dependency-vuln
mitre: null
detect:
  type: typed
remediation: "Reduce the number of direct dependencies. Each dependency increases the attack surface. Consider whether lighter alternatives exist."
test_cases:
  true_positive:
    - { description: "Server has 75 direct dependencies listed in package.json", expected: true }
    - { description: "Server has 60 direct dependencies in requirements.txt", expected: true }
  true_negative:
    - { description: "Server has 15 direct dependencies in package.json", expected: false }
    - { description: "Server has 30 direct dependencies in requirements.txt", expected: false }
enabled: true
