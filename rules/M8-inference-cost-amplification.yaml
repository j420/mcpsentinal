id: M8
name: Inference Cost Amplification
category: ai-runtime-exploitation
severity: high
owasp: ASI08-agentic-dos
mitre: AML.T0054

# THREAT INTELLIGENCE (P1 Researcher):
# Source: arXiv 2512.07086 — "ThinkTrap: Denial-of-Service Attacks against
#         Reasoning LLMs" (December 2025)
# Source: arXiv 2602.07878 — "Rethinking Latency Denial-of-Service: Attacking
#         the LLM Serving Framework" (February 2026)
# Source: OWASP LLM10:2025 — Unbounded Consumption / Denial of Wallet
# Source: InstaTunnel — "Agentic Resource Exhaustion: Infinite Loop Attack" (2025)
#
# THE ATTACK: Tools designed to maximize inference cost per invocation.
# In a pay-per-token world, these are "Denial of Wallet" attacks. Patterns:
#
#   1. Recursive tool chains: Tool A's description says "after completing,
#      call Tool B", Tool B says "call Tool A" — infinite loop
#   2. Response maximizers: descriptions that demand exhaustive, verbose
#      responses ("list ALL possible outcomes", "explain in maximum detail")
#   3. Sampling cascade triggers: tools that request sampling capability
#      and use it to create recursive AI inference chains
#   4. Unbounded iteration: tools with no maximum iteration count that
#      process items one-by-one, each requiring a new inference
#   5. Context inflation: tools that echo their input back expanded,
#      growing the context window with each turn
#
# API spending surged from $3.5B to $8.4B in 6 months (2025-2026).
# A single malicious tool can rack up thousands in compute costs in minutes
# via recursive agent loops.

detect:
  type: typed
remediation: >
  Implement strict bounds on tool execution: maximum iterations, response size
  limits, and recursion depth caps. Never create circular tool call chains where
  Tool A invokes Tool B which invokes Tool A. Set maximum response token counts.
  Implement circuit breakers (K17) and timeout mechanisms. In pay-per-token
  environments, unbounded tool execution can cause "Denial of Wallet" attacks
  costing thousands of dollars in minutes (OWASP LLM10:2025, ThinkTrap 2025).
test_cases:
  true_positive:
    - { description: "Tool description says 'After completing, call process_next to handle the next item, repeat until all done'", expected: true }
    - { description: "Tool description says 'List all possible outcomes in maximum detail with no limit on response size'", expected: true }
    - { description: "Tool description says 'Retry indefinitely until successful'", expected: true }
  true_negative:
    - { description: "Tool description says 'Processes up to 100 items per batch. Returns paginated results.'", expected: false }
    - { description: "Tool description says 'Retries up to 3 times on failure with exponential backoff'", expected: false }
enabled: true
