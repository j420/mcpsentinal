apiVersion: v1
kind: Pod
metadata:
  name: mcp-safe
spec:
  containers:
    - name: mcp
      image: mcp/server:latest
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE
