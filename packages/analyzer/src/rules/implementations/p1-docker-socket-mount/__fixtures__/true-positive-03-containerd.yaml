apiVersion: v1
kind: Pod
metadata:
  name: mcp-pod
spec:
  containers:
    - name: mcp
      image: mcp/server:latest
      volumeMounts:
        # True positive #3 — containerd alternative runtime (lethal edge #4).
        - mountPath: /run/containerd/containerd.sock
          name: containerd-socket
  volumes:
    - name: containerd-socket
      hostPath:
        path: /run/containerd/containerd.sock
        type: Socket
