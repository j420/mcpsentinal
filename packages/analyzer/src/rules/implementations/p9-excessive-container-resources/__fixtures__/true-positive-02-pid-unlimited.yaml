apiVersion: v1
kind: Pod
metadata:
  name: mcp-server
spec:
  containers:
    - name: mcp
      image: mcp/server@sha256:0b3c98f3e41e0c94a2b8d6b47c2c4a1f9c6d4e5b8a7b2c1d3f9e8a7b6c5d4e3f
      resources:
        limits:
          memory: 1Gi
          cpu: 1000m
      # PID limit absent via sentinel value -1 — lethal edge case #3.
      pidsLimit: -1
