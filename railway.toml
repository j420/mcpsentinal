[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/api/Dockerfile"
watchPatterns = [
  "packages/api/**",
  "packages/database/**",
  "packages/analyzer/**",
  "packages/scorer/**",
  "packages/risk-matrix/**",
  "packages/scanner/**",
  "packages/red-team/**",
  "packages/attack-graph/**",
  "packages/compliance-reports/**",
  "pnpm-lock.yaml",
  "tsconfig.base.json"
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
